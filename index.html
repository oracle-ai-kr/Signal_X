<!DOCTYPE html>
<!-- SIGNAL X App v1.6 · S7 홈 카테고리 필터링 · 2026-04-04 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SIGNAL X</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ═══ Theme System ═══ */
/* 기본: 회색 (charcoal) — 밝은 회색 */
:root{
  --bg:#28282e;
  --surface:#333339;
  --surface2:#3e3e45;
  --surface3:#4a4a52;
  --accent:#2563eb;
  --accent2:#3b82f6;
  --accent-glow:rgba(37,99,235,.12);
  --text:#eaeaed;
  --text2:#8e8e96;
  --text3:#58585f;
  --border:rgba(255,255,255,.07);
  --buy:#22c55e;--buy-bg:rgba(34,197,94,.1);--buy-border:rgba(34,197,94,.25);
  --hold:#f59e0b;--hold-bg:rgba(245,158,11,.1);--hold-border:rgba(245,158,11,.25);
  --sell:#ef4444;--sell-bg:rgba(239,68,68,.1);--sell-border:rgba(239,68,68,.25);
  --risk-low:#22c55e;--risk-mid:#f59e0b;--risk-high:#ef4444;
  --radius:14px;--radius-sm:10px;
  --bottom-h:60px;
}
/* 블랙 (black) — OLED 순흑 */
body.sx-black{
  --bg:#000000;--surface:#0a0a0a;--surface2:#141414;--surface3:#1e1e1e;
  --text:#f0f0f0;--text2:#888888;--text3:#555555;
  --border:rgba(255,255,255,.08);
  --buy-bg:rgba(34,197,94,.08);--buy-border:rgba(34,197,94,.2);
  --hold-bg:rgba(245,158,11,.08);--hold-border:rgba(245,158,11,.2);
  --sell-bg:rgba(239,68,68,.08);--sell-border:rgba(239,68,68,.2);
}
/* 크림 (cream) — 진한 베이지 */
body.sx-cream{
  --bg:#e8dfcf;--surface:#f2ebe0;--surface2:#ddd4c4;--surface3:#d0c5b3;
  --text:#1a1612;--text2:#5c5245;--text3:#8a7e6f;
  --border:rgba(0,0,0,.06);
  --accent-glow:rgba(37,99,235,.06);
  --buy-bg:rgba(34,197,94,.06);--buy-border:rgba(34,197,94,.18);
  --hold-bg:rgba(245,158,11,.06);--hold-border:rgba(245,158,11,.18);
  --sell-bg:rgba(239,68,68,.06);--sell-border:rgba(239,68,68,.18);
}
/* 화이트 (white) — 쿨한 라이트 */
body.sx-white{
  --bg:#f3f4f6;--surface:#ffffff;--surface2:#f0f1f4;--surface3:#e6e8ec;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --border:rgba(0,0,0,.06);
  --accent-glow:rgba(37,99,235,.06);
  --buy-bg:rgba(34,197,94,.06);--buy-border:rgba(34,197,94,.18);
  --hold-bg:rgba(245,158,11,.06);--hold-border:rgba(245,158,11,.18);
  --sell-bg:rgba(239,68,68,.06);--sell-border:rgba(239,68,68,.18);
}
/* accent 고정 — blue */

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;}

/* ═══ App Shell ═══ */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;}

/* Top Bar */
.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:var(--accent);color:#fff;
  font-family:'Outfit';font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
}
.tb-logo-text{font-family:'Outfit';font-size:16px;font-weight:800;letter-spacing:.5px;}
.tb-logo-text span{color:var(--accent);}

/* Pages */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
.pad{padding:16px 16px 32px;}

/* Bottom Bar */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-around;
  height:var(--bottom-h);
  background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;
}
.bb-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:6px 16px;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.bb-item svg{width:22px;height:22px;color:var(--text3);transition:color .15s;}
.bb-label{font-size:10px;color:var(--text3);font-weight:500;transition:color .15s;}
.bb-item.active svg{color:var(--accent);}
.bb-item.active .bb-label{color:var(--accent);font-weight:700;}
.bb-item:active{transform:scale(.92);}
.bb-icon-wrap{position:relative;}
.bb-badge{
  position:absolute;top:-3px;right:-8px;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  background:var(--sell);color:#fff;
  font-size:9px;font-weight:800;font-family:'Outfit';
  display:flex;align-items:center;justify-content:center;
}

/* ═══ Common ═══ */
.pg-title{font-size:18px;font-weight:800;margin:16px 0 4px;letter-spacing:-.3px;}
.pg-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .35s ease both;}
.fu:nth-child(2){animation-delay:.06s;}
.fu:nth-child(3){animation-delay:.12s;}
.fu:nth-child(4){animation-delay:.18s;}
.fu:nth-child(5){animation-delay:.24s;}

/* ═══ HOME (Hub Style) ═══ */
.home-search{
  position:relative;margin-bottom:16px;
}
.home-search input{
  width:100%;height:44px;border-radius:22px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  padding:0 42px 0 16px;font-size:14px;font-family:inherit;
  outline:none;transition:border-color .2s;
}
.home-search input::placeholder{color:var(--text3);}
.home-search input:focus{border-color:var(--accent);}
.home-search-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;color:var(--text3);pointer-events:none;
}
.home-search-results{
  position:absolute;top:50px;left:0;right:0;z-index:50;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);max-height:200px;overflow-y:auto;
  display:none;box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.home-search-results.open{display:block;}
.hsr-item{
  padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);transition:background .15s;
}
.hsr-item:last-child{border-bottom:none;}
.hsr-item:active{background:var(--accent-glow);}
.hsr-name{font-size:13px;font-weight:600;}
.hsr-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}

/* Quick Grid (티맵 스타일) */
/* Market Brief Card */
.market-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
}
.mk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mk-label{font-size:12px;font-weight:700;color:var(--accent);}
.mk-date{font-size:11px;color:var(--text3);}
.mk-text{font-size:13px;color:var(--text);line-height:1.7;}
.mk-text b{color:var(--text);font-weight:600;}

/* Section Title & Cards */
.home-section-title{font-size:14px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
.home-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;
  cursor:pointer;transition:border-color .2s;
}
.home-card:active{border-color:var(--accent);}
.hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.hc-name{font-size:14px;font-weight:700;}
.hc-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
.hc-badge.BUY{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border);}
.hc-badge.HOLD{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-border);}
.hc-badge.SELL{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border);}
.hc-row{display:flex;gap:12px;margin-bottom:4px;}
.hc-score{font-family:'Outfit';font-size:13px;font-weight:600;color:var(--text);}
.hc-score b{color:var(--text);font-weight:800;}
.hc-comment{font-size:12px;color:var(--text);line-height:1.5;opacity:.85;}

/* Home Section Expand */
.home-section{display:none;}
.home-section.open{display:block;}

/* ═══ CALENDAR (이력) ═══ */
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding:0 4px;
}
.cal-nav-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.cal-nav-btn:active{transform:scale(.9);background:var(--accent-glow);}
.cal-month{font-family:'Outfit';font-size:15px;font-weight:700;letter-spacing:-.3px;}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  margin-bottom:16px;
}
.cal-dow{
  text-align:center;font-size:10px;font-weight:700;
  color:var(--text3);padding:6px 0;
}
.cal-dow:first-child{color:var(--sell);}
.cal-dow:last-child{color:var(--accent);}
.cal-cell{
  position:relative;text-align:center;padding:8px 0;
  font-family:'Outfit';font-size:13px;font-weight:500;
  color:var(--text2);border-radius:10px;cursor:pointer;
  transition:all .15s;min-height:36px;
  display:flex;align-items:center;justify-content:center;
}
.cal-cell:empty{cursor:default;}
.cal-cell.today{background:var(--accent);color:#fff;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.cal-cell.today.sun,.cal-cell.today.sat{color:#fff;}
.cal-cell.today.has-data::after{background:#fff;}
.cal-cell.selected{background:var(--accent);color:#fff;font-weight:800;opacity:.75;}
.cal-cell.today.selected{opacity:1;}
.cal-cell.has-data::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;background:var(--accent);
}
.cal-cell.selected.has-data::after{background:#fff;}
.cal-cell.other-month{color:var(--text3);opacity:.35;}
.cal-cell:not(:empty):active{background:var(--accent-glow);}
.cal-cell.sun{color:var(--sell);}
.cal-cell.sat{color:var(--accent);}
.cal-cell.selected.sun,.cal-cell.selected.sat{color:#fff;}

.cal-day-label{
  font-size:13px;font-weight:700;color:var(--text2);
  margin-bottom:10px;padding:0 2px;
}
.cal-empty{
  text-align:center;padding:24px 0;
  font-size:12px;color:var(--text3);
}
.cal-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:border-color .2s;
}
.cal-item:active{border-color:var(--accent);}
.cal-item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.cal-item-icon{font-size:20px;flex-shrink:0;}
.cal-item-info{flex:1;min-width:0;}
.cal-item-name{font-size:13px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-item-comment{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cal-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px;}
.cal-item-score{font-family:'Outfit';font-size:14px;font-weight:800;color:var(--text);}
.cal-item-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;}
.cal-item-badge.BUY{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border);}
.cal-item-badge.HOLD{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-border);}
.cal-item-badge.SELL{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border);}
.cal-loading{text-align:center;padding:20px 0;font-size:12px;color:var(--text3);}

/* ═══ ALERTS ═══ */
.alert-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:14px;margin-bottom:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.al-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.al-dot.p1{background:var(--sell);box-shadow:0 0 6px rgba(239,68,68,.3);}
.al-dot.p2{background:var(--hold);box-shadow:0 0 6px rgba(245,158,11,.3);}
.al-dot.p3{background:var(--text3);}
.al-dot.read{opacity:.3;box-shadow:none;}
.al-body{flex:1;}
.al-time{font-size:10px;color:var(--text3);}
.al-title{font-size:13px;font-weight:700;margin:2px 0;}
.al-desc{font-size:12px;color:var(--text);line-height:1.5;opacity:.85;}

/* ═══ SETTINGS ═══ */
.set-group{margin-bottom:20px;}
.set-group-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:14px;letter-spacing:1.2px;text-transform:uppercase;}
/* Mode Selector — Premium 2×2 Card Grid */
.mode-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.mode-card{
  position:relative;padding:18px 14px 14px;border-radius:16px;
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
}
.mode-card:active{transform:scale(.96);}
.mode-card.active{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent),0 6px 20px rgba(37,99,235,.12);
}
.mode-card-preview{
  width:100%;height:48px;border-radius:10px;margin-bottom:12px;
  border:1px solid rgba(128,128,128,.1);overflow:hidden;position:relative;
}
.mode-card-preview-inner{
  width:100%;height:100%;display:flex;align-items:center;padding:0 10px;gap:6px;
}
.mode-card-preview .mp-bar{
  height:6px;border-radius:3px;flex:1;opacity:.6;
}
.mode-card-preview .mp-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.mode-card-info{display:flex;align-items:center;justify-content:space-between;}
.mode-card-name{font-size:13px;font-weight:700;color:var(--text);}
.mode-card.active .mode-card-name{color:var(--accent);}
.mode-card-check{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.mode-card.active .mode-card-check{
  border-color:var(--accent);background:var(--accent);
}
.mode-card.active .mode-card-check::after{
  content:'';width:6px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translateY(-1px);
}
.set-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;
}
.set-item-left{display:flex;align-items:center;gap:10px;}
.set-item-icon{font-size:18px;}
.set-item-label{font-size:13px;font-weight:600;}
.toggle-sw{
  width:44px;height:24px;border-radius:12px;
  background:var(--surface3);position:relative;transition:background .2s;
}
.toggle-sw.on{background:var(--accent);}
.toggle-sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform .2s;
}
.toggle-sw.on::after{transform:translateX(20px);}

/* ═══ DETAIL VIEW (Tab Structure) ═══ */
#detailView{display:none;flex-direction:column;flex:1;overflow:hidden;}
#detailView.open{display:flex;}
.detail-bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.detail-back{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:none;color:var(--text);
  font-size:16px;cursor:pointer;
}
.detail-back:active{transform:scale(.9);}
.detail-title{flex:1;font-weight:700;font-size:15px;letter-spacing:-.3px;}
.detail-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;}

/* Detail Hero (S1 상단 고정) */
.dt-hero{flex-shrink:0;padding:14px 16px 0;background:var(--bg);}

/* Detail Tab Bar */
.dt-tabs{
  display:flex;gap:0;padding:0 16px;
  background:var(--bg);flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.dt-tab{
  flex:1;text-align:center;padding:10px 0 8px;
  font-size:12px;font-weight:600;color:var(--text3);
  cursor:pointer;position:relative;
  transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.dt-tab.active{color:var(--accent);font-weight:700;}
.dt-tab::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2.5px;border-radius:2px;background:transparent;
  transition:background .2s;
}
.dt-tab.active::after{background:var(--accent);}
.dt-tab:active{opacity:.7;}

/* Detail Tab Panels */
.dt-panels{flex:1;overflow:hidden;position:relative;}
.dt-panel{
  display:none;position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 16px 32px;scrollbar-width:none;
}
.dt-panel::-webkit-scrollbar{display:none;}
.dt-panel.active{display:block;}

/* Legacy single-scroll fallback removed */

/* Section Cards */
.sec{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;
  animation:fadeUp .35s ease both;
}
.sec:nth-child(2){animation-delay:.06s;}
.sec:nth-child(3){animation-delay:.12s;}
.sec:nth-child(4){animation-delay:.18s;}
.sec:nth-child(5){animation-delay:.24s;}
.sec:nth-child(6){animation-delay:.3s;}
.sec:nth-child(7){animation-delay:.36s;}
.sec-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:5px;
  background:var(--accent);color:#fff;
  font-family:'Outfit';font-size:10px;font-weight:800;
  margin-right:7px;flex-shrink:0;
}
.sec-hdr{display:flex;align-items:center;font-size:14px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px;}

/* S1: Top Card */
.tc{border:none;position:relative;overflow:hidden;}
.tc.BUY{background:var(--buy-bg);border:1px solid var(--buy-border);}
.tc.HOLD{background:var(--hold-bg);border:1px solid var(--hold-border);}
.tc.SELL{background:var(--sell-bg);border:1px solid var(--sell-border);}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.tc-action{font-family:'Outfit';font-size:30px;font-weight:900;letter-spacing:1px;line-height:1;}
.tc-action.BUY{color:var(--buy);}.tc-action.HOLD{color:var(--hold);}.tc-action.SELL{color:var(--sell);}
.tc-label{font-size:11px;color:var(--text2);margin-top:3px;}
.tc-right{text-align:right;}
.tc-score{font-family:'Outfit';font-size:34px;font-weight:900;line-height:1;}
.tc-grade{font-family:'Outfit';font-size:12px;font-weight:600;color:var(--text2);margin-top:2px;}
.tc-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tc-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:16px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.tc-chip.tag{background:var(--accent-glow);color:var(--accent);border-color:var(--accent);}
.tc-headline{font-size:13px;line-height:1.7;letter-spacing:-.2px;}
.tc-explained{font-size:11.5px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6;}

/* S2: Scoreboard */
.sb-grid{display:flex;flex-direction:column;gap:10px;}
.sb-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;}
.sb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sb-name{font-size:12px;font-weight:700;}
.sb-val{font-family:'Outfit';font-size:18px;font-weight:800;}
.sb-bar{width:100%;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-bottom:5px;}
.sb-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.sb-row{display:flex;justify-content:space-between;align-items:center;}
.sb-rating{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;}
.sb-rating.strong{background:rgba(34,197,94,.1);color:#22c55e;}
.sb-rating.positive{background:rgba(59,130,246,.1);color:#60a5fa;}
.sb-rating.neutral{background:rgba(148,163,184,.1);color:#94a3b8;}
.sb-rating.weak{background:rgba(245,158,11,.1);color:#f59e0b;}
.sb-rating.danger{background:rgba(239,68,68,.1);color:#ef4444;}
.sb-rating.high{background:rgba(239,68,68,.1);color:#ef4444;}
.sb-rating.medium{background:rgba(245,158,11,.1);color:#f59e0b;}
.sb-rating.low{background:rgba(34,197,94,.1);color:#22c55e;}
.sb-weight{font-size:10px;color:var(--text3);}
.sb-comment{font-size:11.5px;color:var(--text2);line-height:1.6;margin-top:6px;}

/* S3: Action Plan */
.ap-prices{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.ap-p{flex:1;min-width:calc(50% - 4px);background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.ap-p-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.ap-p-val{font-family:'Outfit';font-size:15px;font-weight:700;}
.ap-p-val.g{color:var(--buy);}.ap-p-val.r{color:var(--sell);}.ap-p-val.a{color:var(--accent);}
.ap-scenarios{display:flex;flex-direction:column;gap:8px;}
.ap-sc{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;border-left:3px solid transparent;}
.ap-sc.bullish{border-left-color:var(--buy);}.ap-sc.neutral{border-left-color:var(--hold);}.ap-sc.bearish{border-left-color:var(--sell);}
.ap-sc-label{font-size:11px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.ap-sc.bullish .ap-sc-label{color:var(--buy);}.ap-sc.neutral .ap-sc-label{color:var(--hold);}.ap-sc.bearish .ap-sc-label{color:var(--sell);}
.ap-sc-text{font-size:12px;color:var(--text2);line-height:1.65;}

/* S4: Reasoning */
.rg{margin-bottom:12px;}.rg:last-child{margin-bottom:0;}
.rg-label{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.rg-label.pos{color:var(--buy);}.rg-label.neg{color:var(--sell);}.rg-label.chk{color:var(--accent);}
.rg-item{font-size:12px;color:var(--text2);line-height:1.65;padding:5px 0 5px 12px;border-left:2px solid var(--border);margin-bottom:3px;}

/* S5: Market Context */
.mc-grid{display:flex;gap:7px;margin-bottom:10px;}
.mc-item{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.mc-item-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.mc-item-val{font-size:13px;font-weight:700;}
.mc-relation{font-size:12px;color:var(--text2);line-height:1.65;padding:10px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;}
.mc-memo{font-size:11px;color:var(--text3);line-height:1.6;}

/* S6: Alert */
.sec-alert-card{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;}
.sa-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.sa-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sa-dot.p1{background:var(--sell);box-shadow:0 0 6px rgba(239,68,68,.3);}
.sa-dot.p2{background:var(--hold);box-shadow:0 0 6px rgba(245,158,11,.3);}
.sa-dot.p3{background:var(--text3);}
.sa-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
.sa-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.sa-body{font-size:12px;color:var(--text2);line-height:1.6;}
.sa-none{font-size:12px;color:var(--text3);text-align:center;padding:16px 0;}

/* S7: Report */
.rpt-block{margin-bottom:12px;}.rpt-block:last-child{margin-bottom:0;}
.rpt-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.rpt-text{font-size:12px;color:var(--text2);line-height:1.7;}

/* Meta Footer */
.meta-ft{text-align:center;padding:10px 0 16px;font-size:10px;color:var(--text3);}

/* ═══ V2: Circular Progress (Hero Score) ═══ */
.cp-wrap{position:relative;width:80px;height:80px;flex-shrink:0;}
.cp-svg{width:80px;height:80px;transform:rotate(-90deg);}
.cp-bg{fill:none;stroke:var(--surface3);stroke-width:7;}
.cp-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.cp-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.cp-score{font-family:'Outfit';font-size:24px;font-weight:900;line-height:1;}
.cp-grade{font-family:'Outfit';font-size:10px;font-weight:600;color:var(--text2);}

/* ═══ V2: Semi-circle Gauge ═══ */
.sg-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 0;}
.sg-svg{width:120px;height:68px;overflow:visible;}
.sg-bg{fill:none;stroke:var(--surface3);stroke-width:10;stroke-linecap:round;}
.sg-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.sg-center{font-family:'Outfit';font-size:20px;font-weight:800;text-anchor:middle;fill:var(--text);}
.sg-label{font-size:10px;color:var(--text3);margin-top:2px;text-align:center;}

/* ═══ V2: Horizontal Stack Bar (Scenarios) ═══ */
.stk-bar{display:flex;height:28px;border-radius:8px;overflow:hidden;margin-bottom:10px;background:var(--surface3);}
.stk-seg{display:flex;align-items:center;justify-content:center;font-family:'Outfit';font-size:11px;font-weight:700;color:#fff;transition:width .6s ease;min-width:0;overflow:hidden;white-space:nowrap;}
.stk-seg.bull{background:var(--buy);}.stk-seg.neut{background:var(--hold);}.stk-seg.bear{background:var(--sell);}
.stk-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.stk-leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.stk-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ═══ V2: Price Range Bar ═══ */
.prb-wrap{position:relative;margin:20px 0 16px;padding:0 8px;}
.prb-track{height:6px;border-radius:3px;background:var(--surface3);position:relative;}
.prb-fill{position:absolute;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--sell),var(--hold),var(--buy));}
.prb-marker{position:absolute;top:-6px;width:18px;height:18px;border-radius:50%;border:2.5px solid var(--bg);transform:translateX(-50%);z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.prb-marker.m-stop{background:var(--sell);}.prb-marker.m-entry{background:var(--accent);}.prb-marker.m-target{background:var(--buy);}
.prb-marker.m-current{background:var(--text);top:-8px;width:22px;height:22px;z-index:3;}
.prb-label{position:absolute;font-size:9px;font-weight:600;white-space:nowrap;transform:translateX(-50%);color:var(--text3);}
.prb-label.above{top:-22px;}.prb-label.below{top:12px;}
.prb-prices{display:flex;justify-content:space-between;margin-top:18px;}
.prb-p{text-align:center;flex:1;}
.prb-p-label{font-size:9px;color:var(--text3);margin-bottom:2px;}
.prb-p-val{font-family:'Outfit';font-size:13px;font-weight:700;}

/* ═══ V2: Progress Ring (Checklist) ═══ */
.pr-wrap{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.pr-svg{width:56px;height:56px;transform:rotate(-90deg);flex-shrink:0;}
.pr-bg{fill:none;stroke:var(--surface3);stroke-width:6;}
.pr-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.pr-center{font-family:'Outfit';font-size:14px;font-weight:800;}
.pr-stat{display:flex;flex-direction:column;gap:2px;}
.pr-stat-line{font-size:11px;color:var(--text2);}
.pr-stat-line b{color:var(--text);font-weight:700;}

/* ═══ V2: Bidirectional Bar (Positive/Negative) ═══ */
.bdb-wrap{margin-bottom:14px;}
.bdb-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--surface3);margin-bottom:6px;}
.bdb-pos{background:var(--buy);border-radius:5px 0 0 5px;transition:width .6s ease;}
.bdb-neg{background:var(--sell);border-radius:0 5px 5px 0;transition:width .6s ease;margin-left:auto;}
.bdb-labels{display:flex;justify-content:space-between;}
.bdb-label{font-size:10px;font-weight:600;}
.bdb-label.pos{color:var(--buy);}.bdb-label.neg{color:var(--sell);}

/* ═══ V2: Financial Snapshot ═══ */
.fin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.fin-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.fin-item-label{font-size:9px;color:var(--text3);margin-bottom:3px;letter-spacing:.2px;}
.fin-item-val{font-family:'Outfit';font-size:14px;font-weight:700;}
.fin-item-sub{font-size:9px;color:var(--text3);margin-top:1px;}
.fin-analyst{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:6px;}
.fin-analyst-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.fin-analyst-label{font-size:10px;color:var(--text3);min-width:50px;}
.fin-analyst-bar{flex:1;height:6px;border-radius:3px;background:var(--surface3);position:relative;}
.fin-analyst-fill{height:100%;border-radius:3px;background:var(--accent);}
.fin-analyst-marker{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;background:var(--text);border:2px solid var(--bg);transform:translateX(-50%);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.fin-analyst-vals{display:flex;justify-content:space-between;font-family:'Outfit';font-size:10px;color:var(--text3);margin-top:4px;}

/* ═══ V2: Expand Toggle ═══ */
.expand-btn{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--accent);font-weight:600;
  cursor:pointer;padding:6px 0;border:none;background:none;
  font-family:inherit;-webkit-tap-highlight-color:transparent;
}
.expand-btn:active{opacity:.6;}
.expand-content{display:none;overflow:hidden;}
.expand-content.open{display:block;animation:fadeUp .25s ease;}

/* ═══ V2: Hero V2 (Compact) ═══ */
.tc-v2{display:flex;align-items:center;gap:14px;}
.tc-v2-left{flex:1;min-width:0;}
.tc-v2-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ═══ V2: Meta Info Grid ═══ */
.meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px;}
.meta-item{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 10px;}
.meta-item-label{font-size:9px;color:var(--text3);margin-bottom:2px;}
.meta-item-val{font-size:12px;font-weight:600;}
</style>
</head>

<script>
/* ═══ SIGNAL X App ═══ */
const SX={
  mode:(function(){var m=localStorage.getItem('SX_MODE')||'white';if(m==='light')m='white';if(m==='dark')m='charcoal';return m;})(),
  detailOpen:false,

  /* ── Data API ── */
  API_BASE:'https://oracle-ai-kr.github.io/signal-x-data',
  MARKET:null,    // market/latest.json
  RANKING:null,   // ranking/latest.json
  ALERTS_DATA:null, // alerts/latest.json
  STOCK_CACHE:{}, // symbol → full JSON 캐시
  DAILY_INDEX:[], // daily/index.json에서 가져온 날짜 배열
  DAILY_CACHE:{}, // date → daily JSON 캐시
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(), // 0-based
  calSelected:null, // 'YYYY-MM-DD' or null

  /* ── Fallback Demo Data ── */
  STOCKS:[],

  ALERTS:[],

  /* ── Fetch Helpers ── */
  async fetchJSON(path){
    try{
      const r=await fetch(`${this.API_BASE}/${path}?_t=${Date.now()}`,{cache:'no-store'});
      if(!r.ok)return null;
      return await r.json();
    }catch(e){console.warn('SX fetch fail:',path,e);return null;}
  },

  async loadRemoteData(){
    // 병렬로 market + ranking + alerts + daily index + stocks/coins index 가져오기
    const[market,ranking,alerts,dailyIdx,stocksIdx,coinsIdx]=await Promise.all([
      this.fetchJSON('market/latest.json'),
      this.fetchJSON('ranking/latest.json'),
      this.fetchJSON('alerts/latest.json'),
      this.fetchJSON('daily/index.json'),
      this.fetchJSON('stocks/index.json'),
      this.fetchJSON('coins/index.json')
    ]);

    // Market
    if(market){
      this.MARKET=market;
      this.renderMarketCard(market);
    }

    // 종목 목록: stocks/index.json + coins/index.json 우선 → ranking fallback
    const realStocks=[];
    if(Array.isArray(stocksIdx)&&stocksIdx.length>0) realStocks.push(...stocksIdx);
    if(Array.isArray(coinsIdx)&&coinsIdx.length>0) realStocks.push(...coinsIdx);
    if(realStocks.length>0){
      // index.json 데이터를 앱 형식으로 매핑
      const seen=new Set();
      this.STOCKS=realStocks.filter(s=>{if(seen.has(s.symbol))return false;seen.add(s.symbol);return true;}).map(s=>({
        symbol:s.symbol||'',
        name:s.name||s.symbol||'',
        sector:s.sector||'',
        icon:s.action==='BUY'?'📈':s.action==='SELL'?'⚠️':'📊',
        action:s.action||'HOLD',
        score:s.score||0,
        grade:s.grade||'—',
        risk:s.risk||50,
        comment:s.label||'',
        headline:s.label||'',
        confidence:(s.score||50)/100,
        status_tag:s.action==='BUY'?'매수':s.action==='SELL'?'위험':''
      }));
      this.renderHome();
    }else if(ranking&&ranking.top_picks&&ranking.top_picks.length>0){
      // ranking fallback
      const all=[...ranking.top_picks,...(ranking.spike_signals||[]),...(ranking.risk_warnings||[])];
      const seen=new Set();
      const unique=all.filter(s=>{if(seen.has(s.symbol))return false;seen.add(s.symbol);return true;});
      if(unique.length>0){
        this.STOCKS=unique;
        this.renderHome();
      }
    }

    // Alerts
    if(alerts&&alerts.events&&alerts.events.length>0){
      this.ALERTS=alerts.events.map(e=>({
        time:this.timeAgo(e.timestamp||e.time||''),
        title:e.title||'',
        desc:e.body||e.desc||'',
        priority:e.priority||3,
        type:e.alert_type||e.type||'',
        read:e.read||false
      }));
      this.renderAlerts();
    }

    // Daily Index → 달력 dot 갱신
    if(dailyIdx&&dailyIdx.dates){
      this.DAILY_INDEX=dailyIdx.dates;
      this.renderCalendar();
    }
  },

  renderMarketCard(m){
    const card=document.querySelector('.market-card .mk-text');
    if(!card)return;
    let html='';
    // v2 구조: title, date, summary, sections, conclusion
    if(m.summary){
      html=`<div style="font-size:13px;line-height:1.6;color:var(--text1)">${m.summary}</div>`;
      if(m.conclusion&&m.conclusion.action){
        html+=`<div style="margin-top:8px;padding:8px 10px;border-radius:8px;background:var(--card-bg);border:1px solid var(--border);font-size:12px;line-height:1.5">`;
        html+=`<b style="color:var(--accent)">💡 행동 판단</b><br>${m.conclusion.action}`;
        if(m.conclusion.tags&&m.conclusion.tags.length){
          html+=`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">${m.conclusion.tags.map(t=>`<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent-glow);color:var(--accent)">#${t}</span>`).join('')}</div>`;
        }
        html+=`</div>`;
      }
    }
    // legacy 구조 fallback: headline, indices, environment
    else if(m.headline){
      html=m.headline;
      if(m.indices){
        const idx=m.indices,parts=[];
        if(idx.kospi&&idx.kospi.value)parts.push(`코스피 <b>${idx.kospi.value.toLocaleString()}</b> (${idx.kospi.change>0?'+':''}${idx.kospi.change}%)`);
        if(idx.kosdaq&&idx.kosdaq.value)parts.push(`코스닥 <b>${idx.kosdaq.value.toLocaleString()}</b> (${idx.kosdaq.change>0?'+':''}${idx.kosdaq.change}%)`);
        if(parts.length)html+=`<br>${parts.join(' · ')}`;
      }
      if(m.environment&&m.environment.memo)html+=`<br>${m.environment.memo}`;
    }
    card.innerHTML=html||'데이터가 연결되면 이 자리에 <b>시장 요약</b>이 표시됩니다.';
    // 날짜 표시
    if(m.date)document.getElementById('mkDate').textContent=m.date;
  },

  timeAgo(ts){
    if(!ts)return'—';
    try{
      const diff=Date.now()-new Date(ts).getTime();
      const min=Math.floor(diff/60000);
      if(min<1)return'방금';
      if(min<60)return`${min}분 전`;
      const hr=Math.floor(min/60);
      if(hr<24)return`${hr}시간 전`;
      const day=Math.floor(hr/24);
      if(day<7)return`${day}일 전`;
      return new Date(ts).toLocaleDateString('ko-KR');
    }catch(e){return ts;}
  },

  /* ── Fetch Stock Detail JSON ── */
  async fetchStockDetail(symbol){
    // 캐시 체크
    if(this.STOCK_CACHE[symbol])return this.STOCK_CACHE[symbol];
    // 주식 먼저, 없으면 코인
    let data=await this.fetchJSON(`stocks/${symbol}.json`);
    if(!data)data=await this.fetchJSON(`coins/${symbol}.json`);
    if(data){this.STOCK_CACHE[symbol]=data;}
    return data;
  },

  /* ── Navigation ── */
  go(pgId,el){
    if(this.detailOpen) this.closeDetail(true);
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(pgId).classList.add('active');
    document.querySelectorAll('.bb-item').forEach(b=>b.classList.remove('active'));

  /* ── Detail ── */
  async openDetail(sym){
    const stock=this.STOCKS.find(s=>s.symbol===sym);
    if(!stock)return;
    const dv=document.getElementById('detailView');
    document.getElementById('mainTopBar').style.display='none';
    document.getElementById('bottomBar').style.display='none';
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    dv.classList.add('open');
    this.detailOpen=true;
    history.pushState({sx:'detail',sym},'');

    // 실제 JSON fetch 시도
    const fullData=await this.fetchStockDetail(sym);
    if(fullData&&(fullData.identity||fullData.summary)){
      // v2.1 호환: identity가 없으면 최소 구조 보강
      if(!fullData.identity)fullData.identity={};
      if(!fullData.identity.ticker&&!fullData.identity.symbol)fullData.identity.ticker=sym;
      if(!fullData.identity.name)fullData.identity.name=stock.name||sym;
      this.renderFullDetail(fullData);
    }else{
      this.renderDetail(stock);
    }
  },
  closeDetail(skipPush){
    const dv=document.getElementById('detailView');

    document.getElementById('mainTopBar').style.display='';
    document.getElementById('bottomBar').style.display='';
    document.querySelectorAll('.page').forEach(p=>p.style.display='');

  },

  /* ── Render: Full JSON (v2.1 스키마 대응 — V2 시각화) ── */
  renderFullDetail(data){
    const{identity:id,summary:sm,scoreboard:sb,action_plan:ap,reasoning:rs,market_context:mc,alerting:al,meta}=data;
    const sym=id.ticker||id.symbol||'';
    const name=id.name||sym;
    const market=id.exchange||id.market||'';
    const sector=id.sector||'';
    const tf=id.analysis_timeframe||id.timeframe||'';
    this._dtTitleBar(name,sym,sm.action);
    this.dtTab(0);
    const conf=sm.confidence?Math.round(sm.confidence*100):Math.round((sm.score||0)*0.85+10);
    const riskSrc=sb.sources?sb.sources.risk:sb.risk;
    const riskRating=riskSrc?.rating||(al?.priority_label)||'medium';
    const rl=this.riskLabel(riskRating);
    const fmt=n=>n==null?'—':typeof n==='number'?n.toLocaleString('ko-KR'):String(n);
    const bc=(sc,isR)=>{if(isR)return sc<=30?'var(--risk-low)':sc<=60?'var(--risk-mid)':'var(--risk-high)';return sc>=70?'var(--buy)':sc>=50?'var(--accent)':sc>=30?'var(--hold)':'var(--sell)';};
    const scoreColor=sm.score>=70?'var(--buy)':sm.score>=50?'var(--accent)':sm.score>=30?'var(--hold)':'var(--sell)';

    /* ═══ HERO — 원형 프로그레스 + 컴팩트 요약 ═══ */
    const circR=33,circC=2*Math.PI*circR,circOff=circC*(1-sm.score/100);
    const summaryText=sm.score_summary||sm.label||'';
    const chips=`<span class="tc-chip">${market}</span><span class="tc-chip">${sector}</span><span class="tc-chip">${tf}</span>${sm.status_tag?`<span class="tc-chip tag">${sm.status_tag}</span>`:''}`;
    document.getElementById('dtHero').innerHTML=`<div class="sec tc ${sm.action}" style="margin-bottom:0;">
      <div class="tc-v2">
        <div class="tc-v2-left">
          <div class="tc-action ${sm.action}" style="font-size:26px;">${sm.action}</div>
          <div class="tc-label">${sm.label||''}</div>
          <div class="tc-chips" style="margin-top:8px;margin-bottom:0;">${chips}</div>
        </div>
        <div class="cp-wrap">
          <svg class="cp-svg" viewBox="0 0 80 80">
            <circle class="cp-bg" cx="40" cy="40" r="${circR}"/>
            <circle class="cp-fill" cx="40" cy="40" r="${circR}" stroke="${scoreColor}" stroke-dasharray="${circC}" stroke-dashoffset="${circOff}"/>
          </svg>
          <div class="cp-center">
            <div class="cp-score" style="color:${scoreColor}">${sm.score}</div>
            <div class="cp-grade">Grade ${sm.grade}</div>
          </div>
        </div>
      </div>
      ${summaryText?`<div class="tc-v2-summary">${summaryText}</div>`:''}
    </div>`;

    /* ═══ TAB 0: 종합 — 4원천 반원 게이지 + 재무 스냅샷 ═══ */
    const sources=sb.sources||sb;
    const dims=[{k:'value',l:'가치',e:'💰'},{k:'growth',l:'성장',e:'📈'},{k:'momentum',l:'모멘텀',e:'⚡'},{k:'risk',l:'리스크',e:'🛡️'}];
    let t0=`<div class="sec"><div class="sec-hdr"><span class="sec-num">1</span>4원천 점수</div>
      <div class="sb-grid">`;
    dims.forEach(d=>{
      const it=sources[d.k];if(!it)return;
      const isR=d.k==='risk';const c=bc(it.score,isR);
      const comment=it.reason||it.comment||'';
      // 반원 게이지: arc path
      const gaugeId=`sg_${d.k}_${Date.now()}`;
      const arcLen=Math.PI*50; // 반원 둘레
      const arcOff=arcLen*(1-it.score/100);
      t0+=`<div class="sb-item">
        <div class="sb-top"><span class="sb-name">${d.e} ${d.l}</span><span class="sb-rating ${it.rating||''}">${it.rating||'—'}</span></div>
        <div class="sg-wrap">
          <svg class="sg-svg" viewBox="0 0 120 68">
            <path class="sg-bg" d="M 10 60 A 50 50 0 0 1 110 60"/>
            <path class="sg-fill" d="M 10 60 A 50 50 0 0 1 110 60" stroke="${c}" stroke-dasharray="${arcLen}" stroke-dashoffset="${arcOff}"/>
            <text class="sg-center" x="60" y="55" style="fill:${c}">${it.score}</text>
          </svg>
          <div class="sg-label">${Math.round((it.weight||0)*100)}% 비중</div>
        </div>
        <div class="sb-comment">${comment}</div>
      </div>`;
    });
    t0+=`</div></div>`;

    // score_explained 펼치기
    if(sm.score_explained){
      t0+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>점수 산출 근거</div>
        <button class="expand-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ 접기':'▼ 상세 산출 보기'">▼ 상세 산출 보기</button>
        <div class="expand-content"><div style="font-size:11.5px;color:var(--text2);line-height:1.7;padding:8px 0;">${sm.score_explained}</div></div>
      </div>`;
    }

    // 재무 스냅샷 (meta.financial_snapshot)
    const fin=meta?.financial_snapshot;
    if(fin){
      t0+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">3</span>재무 스냅샷</div>
        <div class="fin-grid">
          ${fin.pbr!=null?`<div class="fin-item"><div class="fin-item-label">PBR</div><div class="fin-item-val">${fin.pbr}x</div></div>`:''}
          ${fin.forward_per_2026f!=null?`<div class="fin-item"><div class="fin-item-label">Forward PER</div><div class="fin-item-val">${fin.forward_per_2026f}x</div><div class="fin-item-sub">2026F</div></div>`:''}
          ${fin.ev_ebitda_2026f!=null?`<div class="fin-item"><div class="fin-item-label">EV/EBITDA</div><div class="fin-item-val">${fin.ev_ebitda_2026f}x</div><div class="fin-item-sub">2026F</div></div>`:''}
          ${fin.market_cap_approx?`<div class="fin-item"><div class="fin-item-label">시가총액</div><div class="fin-item-val">${(fin.market_cap_approx/1e12).toFixed(1)}조</div></div>`:''}
          ${fin.foreign_ownership_pct!=null?`<div class="fin-item"><div class="fin-item-label">외인 비율</div><div class="fin-item-val">${fin.foreign_ownership_pct}%</div></div>`:''}
          ${fin.dividend_2025_2027?`<div class="fin-item"><div class="fin-item-label">배당</div><div class="fin-item-val" style="font-size:12px;">${fin.dividend_2025_2027}</div></div>`:''}
          ${fin.revenue_annual?`<div class="fin-item"><div class="fin-item-label">매출(연간)</div><div class="fin-item-val">${(fin.revenue_annual/1e12).toFixed(1)}조</div><div class="fin-item-sub">${fin.last_annual||''}</div></div>`:''}
          ${fin.operating_profit_annual!=null?`<div class="fin-item"><div class="fin-item-label">영업이익</div><div class="fin-item-val" style="color:${fin.operating_profit_annual<0?'var(--sell)':'var(--buy)'}">${(fin.operating_profit_annual/1e12).toFixed(1)}조</div><div class="fin-item-sub">${fin.last_annual||''}</div></div>`:''}
        </div>`;
      // 애널리스트 목표가 레인지 바
      if(fin.analyst_target_low&&fin.analyst_target_high){
        const aLow=fin.analyst_target_low,aHigh=fin.analyst_target_high,aCon=fin.analyst_target_consensus||((aLow+aHigh)/2);
        const curPrice=ap.entry_price||ap.current_price||aCon;
        const range=aHigh-aLow;
        const curPct=range>0?Math.max(0,Math.min(100,((curPrice-aLow)/range)*100)):50;
        const conPct=range>0?Math.max(0,Math.min(100,((aCon-aLow)/range)*100)):50;
        t0+=`<div class="fin-analyst">
          <div style="font-size:10px;font-weight:700;color:var(--accent);margin-bottom:8px;">🎯 애널리스트 목표가 (${fin.analyst_count||'—'}명)</div>
          <div class="fin-analyst-bar" style="position:relative;height:6px;margin:12px 0;">
            <div class="fin-analyst-fill" style="width:100%;background:linear-gradient(90deg,var(--sell),var(--hold),var(--buy));border-radius:3px;height:100%;"></div>
            <div class="fin-analyst-marker" style="left:${conPct}%;background:var(--accent);" title="컨센서스 ${fmt(aCon)}"></div>
            <div class="fin-analyst-marker" style="left:${curPct}%;background:var(--text);width:12px;height:12px;top:-3px;" title="현재가 ${fmt(curPrice)}"></div>
          </div>
          <div class="fin-analyst-vals"><span>${fmt(aLow)}</span><span style="color:var(--accent);font-weight:700;">컨센서스 ${fmt(aCon)}</span><span>${fmt(aHigh)}</span></div>
          ${fin.analyst_recommendation?`<div style="text-align:center;margin-top:6px;font-size:11px;color:var(--text2);">증권사 의견: <b style="color:var(--buy)">${fin.analyst_recommendation}</b></div>`:''}
        </div>`;
      }
      t0+=`</div>`;
    }
    document.getElementById('dtP0').innerHTML=t0;

    /* ═══ TAB 1: 행동 — 가격 레인지 바 + 시나리오 스택 바 ═══ */
    const entryVal=ap.entry_price||ap.current_price;
    const targetVal=ap.target_price||ap.target_1;
    const target2Val=ap.target_2||null;
    const stopVal=ap.stop_loss;
    const entryNote=ap.entry_note||'';
    let t1=`<div class="sec"><div class="sec-hdr"><span class="sec-num">1</span>행동 가이드</div>
      ${ap.position?`<div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px;">${ap.position}</div>`:''}`;

    // 가격 레인지 바
    if(stopVal&&targetVal){
      const pMin=stopVal*0.97, pMax=targetVal*1.03, pRange=pMax-pMin;
      const pos=v=>pRange>0?Math.max(0,Math.min(100,((v-pMin)/pRange)*100)):50;
      const curP=entryVal||((stopVal+targetVal)/2);
      t1+=`<div class="prb-wrap">
        <div class="prb-track">
          <div class="prb-fill" style="left:${pos(stopVal)}%;width:${pos(targetVal)-pos(stopVal)}%;"></div>
          <div class="prb-marker m-stop" style="left:${pos(stopVal)}%;" title="손절 ${fmt(stopVal)}"></div>
          <div class="prb-marker m-entry" style="left:${pos(entryVal)}%;" title="진입 ${fmt(entryVal)}"></div>
          <div class="prb-marker m-target" style="left:${pos(targetVal)}%;" title="목표 ${fmt(targetVal)}"></div>
          <div class="prb-marker m-current" style="left:${pos(curP)}%;" title="현재가 ${fmt(curP)}"></div>
        </div>
        <div class="prb-prices">
          <div class="prb-p"><div class="prb-p-label">손절</div><div class="prb-p-val" style="color:var(--sell)">${fmt(stopVal)}</div></div>
          <div class="prb-p"><div class="prb-p-label">진입</div><div class="prb-p-val" style="color:var(--accent)">${fmt(entryVal)}</div></div>
          <div class="prb-p"><div class="prb-p-label">목표</div><div class="prb-p-val" style="color:var(--buy)">${fmt(targetVal)}</div></div>
        </div>
      </div>`;
      if(ap.risk_reward_ratio){t1+=`<div style="text-align:center;font-family:'Outfit';font-size:12px;color:var(--text2);margin:6px 0;">R:R ${ap.risk_reward_ratio}${ap.holding_period?` · ${ap.holding_period}`:''}</div>`;}
    }else{
      // fallback: 기존 가격 박스
      t1+=`<div class="ap-prices">
        <div class="ap-p"><div class="ap-p-label">진입가</div><div class="ap-p-val a">${fmt(entryVal)}</div></div>
        <div class="ap-p"><div class="ap-p-label">목표가</div><div class="ap-p-val g">${fmt(targetVal)}</div></div>
        <div class="ap-p"><div class="ap-p-label">손절가</div><div class="ap-p-val r">${fmt(stopVal)}</div></div>
      </div>`;
    }
    if(entryNote){t1+=`<div style="font-size:11px;color:var(--text2);margin:8px 0;line-height:1.5;padding:8px 10px;background:var(--surface2);border-radius:8px;">${entryNote}</div>`;}
    t1+=`</div>`;

    // 시나리오 — 수평 스택 바 + 상세 카드
    if(ap.scenarios&&Array.isArray(ap.scenarios)&&ap.scenarios.length>0){
      t1+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>시나리오 분석</div>`;
      // 스택 바
      t1+=`<div class="stk-bar">`;
      ap.scenarios.forEach(sc=>{
        const cls=sc.probability>=40?'bull':sc.probability>=25?'neut':'bear';
        t1+=`<div class="stk-seg ${cls}" style="width:${sc.probability}%">${sc.probability}%</div>`;
      });
      t1+=`</div>`;
      // 범례
      t1+=`<div class="stk-legend">`;
      ap.scenarios.forEach(sc=>{
        const cls=sc.probability>=40?'bull':sc.probability>=25?'neut':'bear';
        const dotColor=cls==='bull'?'var(--buy)':cls==='neut'?'var(--hold)':'var(--sell)';
        t1+=`<div class="stk-leg-item"><div class="stk-leg-dot" style="background:${dotColor}"></div>${sc.label}</div>`;
      });
      t1+=`</div>`;
      // 상세 카드
      t1+=`<div class="ap-scenarios">`;
      ap.scenarios.forEach(sc=>{
        const cls=sc.probability>=40?'bullish':sc.probability>=25?'neutral':'bearish';
        const icon=cls==='bullish'?'🟢':cls==='neutral'?'🟡':'🔴';
        t1+=`<div class="ap-sc ${cls}"><div class="ap-sc-label">${icon} ${sc.label} (${sc.probability}%)</div><div class="ap-sc-text">${sc.description}</div></div>`;
      });
      t1+=`</div></div>`;
    }
    // legacy 객체 scenarios fallback
    else if(ap.scenarios&&typeof ap.scenarios==='object'){
      t1+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>시나리오 분석</div><div class="ap-scenarios">`;
      ['bullish','neutral','bearish'].forEach(k=>{if(ap.scenarios[k])t1+=`<div class="ap-sc ${k}"><div class="ap-sc-label">${k==='bullish'?'🟢 상승':k==='neutral'?'🟡 횡보':'🔴 하락'}</div><div class="ap-sc-text">${ap.scenarios[k]}</div></div>`;});
      t1+=`</div></div>`;
    }
    document.getElementById('dtP1').innerHTML=t1;

    /* ═══ TAB 2: 근거 — 양방향 바 + 체크리스트 프로그레스 링 + 시장 맥락 ═══ */
    const posCount=rs.positive?.length||0;
    const negCount=rs.negative?.length||0;
    const total=posCount+negCount||1;
    let t2=`<div class="sec"><div class="sec-hdr"><span class="sec-num">1</span>근거 요약</div>`;
    // 양방향 바
    t2+=`<div class="bdb-wrap">
      <div class="bdb-bar">
        <div class="bdb-pos" style="width:${(posCount/total)*100}%"></div>
        <div class="bdb-neg" style="width:${(negCount/total)*100}%"></div>
      </div>
      <div class="bdb-labels"><span class="bdb-label pos">▲ 긍정 ${posCount}</span><span class="bdb-label neg">▼ 부정 ${negCount}</span></div>
    </div>`;
    // 긍정
    if(posCount){
      rs.positive.forEach(t=>{
        const txt=typeof t==='string'?t:`<b>${t.factor}</b> — ${t.detail}`;
        t2+=`<div class="rg-item" style="border-left-color:var(--buy);">${txt}</div>`;
      });
    }
    // 부정
    if(negCount){
      t2+=`<div style="margin-top:10px;"></div>`;
      rs.negative.forEach(t=>{
        const txt=typeof t==='string'?t:`<b>${t.factor}</b> — ${t.detail}`;
        t2+=`<div class="rg-item" style="border-left-color:var(--sell);">${txt}</div>`;
      });
    }
    t2+=`</div>`;

    // 체크리스트 프로그레스 링
    const checks=rs.checklist||rs.checkpoints;
    if(checks?.length){
      const passN=checks.filter(c=>typeof c==='object'?c.status==='pass':false).length;
      const failN=checks.filter(c=>typeof c==='object'?c.status==='fail':false).length;
      const warnN=checks.filter(c=>typeof c==='object'?c.status==='warning':false).length;
      const totalC=checks.length;
      const pct=Math.round((passN/totalC)*100);
      const prR=22,prC=2*Math.PI*prR,prOff=prC*(1-passN/totalC);
      const prColor=pct>=70?'var(--buy)':pct>=40?'var(--hold)':'var(--sell)';
      t2+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>체크리스트</div>
        <div class="pr-wrap">
          <svg class="pr-svg" viewBox="0 0 56 56">
            <circle class="pr-bg" cx="28" cy="28" r="${prR}"/>
            <circle class="pr-fill" cx="28" cy="28" r="${prR}" stroke="${prColor}" stroke-dasharray="${prC}" stroke-dashoffset="${prOff}"/>
          </svg>
          <div class="pr-stat">
            <div class="pr-stat-line"><b style="color:${prColor}">${pct}%</b> 통과</div>
            <div class="pr-stat-line">✅ ${passN} · ❌ ${failN} · ⚠️ ${warnN}</div>
          </div>
        </div>`;
      checks.forEach(t=>{
        if(typeof t==='string'){t2+=`<div class="rg-item">${t}</div>`;}
        else{const icon=t.status==='pass'?'✅':t.status==='fail'?'❌':'⚠️';t2+=`<div class="rg-item">${icon} ${t.item}</div>`;}
      });
      t2+=`</div>`;
    }

    // 시장 맥락
    const mcSummary=mc.macro_summary||mc.relation||'';
    const mcSector=mc.sector_position||mc.phase||'';
    const mcCorr=mc.correlation_note||mc.environment_memo||'';
    if(mcSummary||mcSector||mcCorr){
      t2+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">3</span>시장 맥락</div>
        <div class="mc-grid" style="margin-bottom:10px;">
          <div class="mc-item"><div class="mc-item-label">리스크</div><div class="mc-item-val" style="color:${rl.color}">${rl.text}</div></div>
        </div>
        ${mcSummary?`<div class="mc-relation">${mcSummary}</div>`:''}
        ${mcSector?`<div class="mc-memo" style="margin-top:6px;"><b style="color:var(--accent)">섹터:</b> ${mcSector}</div>`:''}
        ${mcCorr?`<div class="mc-memo" style="margin-top:4px;"><b style="color:var(--accent)">상관관계:</b> ${mcCorr}</div>`:''}
      </div>`;
    }
    document.getElementById('dtP2').innerHTML=t2;

    /* ═══ TAB 3: 알림 — 알림 조건 + 메타 정보 ═══ */
    let t3=`<div class="sec"><div class="sec-hdr"><span class="sec-num">1</span>알림 조건</div>`;
    if(al){
      const prio=al.priority||3;
      const pLabel=al.priority_label||(['','긴급','중요','참고'][prio])||'참고';
      const trigger=al.trigger||'';
      const conditions=al.conditions||[];
      t3+=`<div class="sec-alert-card"><div class="sa-top"><div class="sa-dot p${prio}"></div><div class="sa-type">${pLabel}</div></div>`;
      if(trigger)t3+=`<div class="sa-title">${trigger}</div>`;
      if(conditions.length)t3+=`<div class="sa-body">${conditions.map(c=>`<div style="padding:3px 0;border-bottom:1px solid var(--border);font-size:12px;">${c}</div>`).join('')}</div>`;
      if(al.throttle){
        t3+=`<div style="margin-top:8px;font-size:10px;color:var(--text3);">간격: ${al.throttle.interval_hours}h · 변동폭: ${al.throttle.delta_threshold}p · 쿨다운: ${al.throttle.cooldown_hours}h</div>`;
      }
      t3+=`</div>`;
    }else{t3+=`<div class="sa-none">알림 없음</div>`;}
    t3+=`</div>`;

    // 리포트 (reasoning.report가 있으면)
    if(rs.report){
      t3+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>분석 리포트</div>`;
      [{k:'interpretation',l:'해석'},{k:'change_reason',l:'변화 사유'},{k:'market_relation',l:'시장 연관'},{k:'watch_note',l:'관찰 포인트'}].forEach(b=>{
        if(rs.report[b.k])t3+=`<div class="rpt-block"><div class="rpt-label">${b.l}</div><div class="rpt-text">${rs.report[b.k]}</div></div>`;
      });
      t3+=`</div>`;
    }

    // Meta 정보 그리드
    const analysisDate=meta?.analysis_date||id.analyzed_at||'';
    const ts=analysisDate?(/^\d{4}-\d{2}-\d{2}$/.test(analysisDate)?analysisDate:new Date(analysisDate).toLocaleString('ko-KR')):'—';
    const dataSources=meta?.data_sources||[];
    const slVersion=meta?.signal_lab_version||'';
    const scoringMethod=meta?.validation?.scoring_method||'';
    t3+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">${rs.report?'3':'2'}</span>분석 메타</div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-item-label">분석일</div><div class="meta-item-val">${ts}</div></div>
        <div class="meta-item"><div class="meta-item-label">스키마</div><div class="meta-item-val">v${meta?.version||'2.1'}</div></div>
        ${slVersion?`<div class="meta-item"><div class="meta-item-label">Signal Lab</div><div class="meta-item-val">${slVersion}</div></div>`:''}
        ${dataSources.length?`<div class="meta-item"><div class="meta-item-label">데이터 소스</div><div class="meta-item-val" style="font-size:10px;">${dataSources.join(', ')}</div></div>`:''}
        ${scoringMethod?`<div class="meta-item" style="grid-column:span 2;"><div class="meta-item-label">산출 방법</div><div class="meta-item-val" style="font-size:10px;">${scoringMethod}</div></div>`:''}
      </div>
      ${meta?.validation?.adjustments?`<div style="margin-top:4px;">${meta.validation.adjustments.map(a=>`<div style="font-size:10px;color:var(--text3);padding:2px 0;">· ${a}</div>`).join('')}</div>`:''}
    </div>`;

    t3+=`<div class="meta-ft">SIGNAL X · v2.1 · ${ts}</div>`;
    document.getElementById('dtP3').innerHTML=t3;
  },

  /* ── Helpers ── */
  riskLabel(sc){
    // v2.1 호환: 문자열 rating도 지원
    if(typeof sc==='string'){
      const s=sc.toLowerCase();
      if(s==='low'||s==='안정')return{text:'안정',color:'var(--risk-low)'};
      if(s==='medium'||s==='주의')return{text:'주의',color:'var(--risk-mid)'};
      return{text:'위험',color:'var(--risk-high)'};
    }
    if(sc<=30)return{text:'안정',color:'var(--risk-low)'};
    if(sc<=60)return{text:'주의',color:'var(--risk-mid)'};
    return{text:'위험',color:'var(--risk-high)'};
  },
  actionLabel(a,sc){
    if(sc>=85)return'강한 매수 후보';if(sc>=70)return'관심 관찰';
    if(sc>=50)return'보류';if(sc>=30)return'주의';return'회피';
  },
  demoScore(name,score,rating,weight){
    const c=score>=70?'var(--buy)':score>=50?'var(--accent)':score>=30?'var(--hold)':'var(--sell)';
    return`<div class="sb-item"><div class="sb-top"><span class="sb-name">${name}</span><span class="sb-val" style="color:${c}">${score}</span></div>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${score}%;background:${c}"></div></div>
      <div class="sb-row"><span class="sb-rating ${rating}">${rating}</span><span class="sb-weight">${weight}%</span></div></div>`;
  },
  demoScoreRisk(name,score,rating,weight){
    const c=score<=30?'var(--risk-low)':score<=60?'var(--risk-mid)':'var(--risk-high)';
    return`<div class="sb-item"><div class="sb-top"><span class="sb-name">${name}</span><span class="sb-val" style="color:${c}">${score}</span></div>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${score}%;background:${c}"></div></div>
      <div class="sb-row"><span class="sb-rating ${rating}">${rating}</span><span class="sb-weight">${weight}%</span></div></div>`;
  },

  /* ── Theme ── */
  applyTheme(){
    // 모드 클래스 전환
    document.body.classList.remove('sx-black','sx-cream','sx-white');
    if(this.mode==='black')document.body.classList.add('sx-black');
    else if(this.mode==='cream')document.body.classList.add('sx-cream');
    else if(this.mode==='white')document.body.classList.add('sx-white');
    localStorage.setItem('SX_MODE',this.mode);
    this.renderModeRow();
  },
  renderModeRow(){
    const row=document.getElementById('modeRow');
    if(!row)return;
    const modes=[
      {k:'black',l:'다크',bg:'#000000',bar1:'#1a1a1a',bar2:'#2a2a2a',dot:'#3b82f6'},
      {k:'charcoal',l:'회색',bg:'#28282e',bar1:'#3e3e45',bar2:'#4a4a52',dot:'#3b82f6'},
      {k:'cream',l:'베이지',bg:'#e8dfcf',bar1:'#ddd4c4',bar2:'#d0c5b3',dot:'#2563eb'},
      {k:'white',l:'라이트',bg:'#f3f4f6',bar1:'#e5e7eb',bar2:'#d1d5db',dot:'#2563eb'}
    ];
    row.innerHTML=modes.map(m=>{
      const act=m.k===this.mode?' active':'';
      return `<div class="mode-card${act}" onclick="SX.setMode('${m.k}')">
        <div class="mode-card-preview" style="background:${m.bg}">
          <div class="mode-card-preview-inner">
            <div class="mp-dot" style="background:${m.dot}"></div>
            <div class="mp-bar" style="background:${m.bar1}"></div>
            <div class="mp-bar" style="background:${m.bar2};flex:.6"></div>
          </div>
        </div>
        <div class="mode-card-info">
          <span class="mode-card-name">${m.l}</span>
          <div class="mode-card-check"></div>
        </div>
      </div>`;
    }).join('');
  },
  setMode(m){this.mode=m;this.applyTheme();},

  /* ── Calendar ── */
  calPrev(){
    this.calMonth--;
    if(this.calMonth<0){this.calMonth=11;this.calYear--;}
    this.calSelected=null;
    this.renderCalendar();
  },
  calNext(){
    this.calMonth++;
    if(this.calMonth>11){this.calMonth=0;this.calYear++;}
    this.calSelected=null;
    this.renderCalendar();
  },
  calDateStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;},
  renderCalendar(){
    const y=this.calYear,m=this.calMonth;
    document.getElementById('calMonth').textContent=`${y}년 ${m+1}월`;
    const grid=document.getElementById('calGrid');
    const first=new Date(y,m,1);
    const lastDay=new Date(y,m+1,0).getDate();
    const startDow=first.getDay(); // 0=Sun
    const today=new Date();
    const todayStr=this.calDateStr(today.getFullYear(),today.getMonth(),today.getDate());

    let html='';
    ['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);

    // 이전달 빈칸
    const prevLast=new Date(y,m,0).getDate();
    for(let i=startDow-1;i>=0;i--){
      html+=`<div class="cal-cell other-month">${prevLast-i}</div>`;
    }

    // 이번달
    for(let d=1;d<=lastDay;d++){
      const ds=this.calDateStr(y,m,d);
      const dow=new Date(y,m,d).getDay();
      let cls='cal-cell';
      if(ds===todayStr)cls+=' today';
      if(ds===this.calSelected)cls+=' selected';
      if(this.DAILY_INDEX.includes(ds))cls+=' has-data';
      if(dow===0)cls+=' sun';
      if(dow===6)cls+=' sat';
      html+=`<div class="${cls}" onclick="SX.selectDate('${ds}')">${d}</div>`;
    }

    // 다음달 빈칸
    const totalCells=startDow+lastDay;
    const remain=totalCells%7===0?0:7-totalCells%7;
    for(let i=1;i<=remain;i++){
      html+=`<div class="cal-cell other-month">${i}</div>`;
    }

    grid.innerHTML=html;

    // 선택된 날짜 없으면 리스트 초기화
    if(!this.calSelected){
      document.getElementById('calDayLabel').innerHTML='';
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">날짜를 선택하면 분석 이력이 표시됩니다.</div>';
    }
  },

  async selectDate(ds){
    this.calSelected=ds;
    this.renderCalendar();
    const parts=ds.split('-');
    const label=`${parseInt(parts[1])}월 ${parseInt(parts[2])}일 분석`;
    document.getElementById('calDayLabel').innerHTML=`<div class="cal-day-label">${label}</div>`;
    document.getElementById('calDayList').innerHTML='<div class="cal-loading">불러오는 중...</div>';

    let data=this.DAILY_CACHE[ds];
    if(!data){
      data=await this.fetchJSON(`daily/${ds}.json`);
      if(data)this.DAILY_CACHE[ds]=data;
    }

    if(data&&data.stocks&&data.stocks.length>0){
      document.getElementById('calDayList').innerHTML=data.stocks.map(s=>
        `<div class="cal-item fu" onclick="SX.openDetail('${s.symbol}')">
          <div class="cal-item-left">
            <div class="cal-item-icon">${s.icon||'📊'}</div>
            <div class="cal-item-info">
              <div class="cal-item-name">${s.name}</div>
              <div class="cal-item-comment">${s.comment||s.headline||''}</div>
            </div>
          </div>
          <div class="cal-item-right">
            <span class="cal-item-score">${s.score}</span>
            <span class="cal-item-badge ${s.action}">${s.action}</span>
          </div>
        </div>`
      ).join('');
    }else if(this.DAILY_INDEX.includes(ds)){
      // index에는 있지만 fetch 실패
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">데이터를 불러올 수 없습니다.</div>';
    }else{
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">이 날짜에 분석된 종목이 없습니다.</div>';
    }
  },

  /* ── Render Lists ── */
  renderHome(){
    const d=new Date();
    document.getElementById('mkDate').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

    // Top picks — BUY 종목만, 점수순
    const top=this.STOCKS.filter(s=>s.action==='BUY').sort((a,b)=>b.score-a.score);
    document.getElementById('homeTopList').innerHTML=top.map(s=>this.homeCard(s)).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 0;">현재 BUY 추천 종목이 없습니다.</div>';
  },
  homeCard(s){
    return`<div class="home-card fu" onclick="SX.openDetail('${s.symbol}')">
      <div class="hc-top"><span class="hc-name">${s.icon} ${s.name}</span><span class="hc-badge ${s.action}">${s.action} ${s.score}</span></div>
      <div class="hc-comment">${s.comment}</div>
    </div>`;
  },

  /* ── Home Search ── */
  onSearch(val){
    const box=document.getElementById('homeSearchResults');
    const q=val.trim().toLowerCase();
    if(!q){box.classList.remove('open');box.innerHTML='';return;}
    const hits=this.STOCKS.filter(s=>s.name.toLowerCase().includes(q)||s.symbol.includes(q));
    if(hits.length===0){
      box.innerHTML='<div class="hsr-item"><span class="hsr-name" style="color:var(--text3)">검색 결과 없음</span></div>';
    }else{
      box.innerHTML=hits.map(s=>`<div class="hsr-item" onmousedown="SX.openDetail('${s.symbol}')">
        <span class="hsr-name">${s.icon} ${s.name} <span style="color:var(--text3);font-size:11px">${s.symbol}</span></span>
        <span class="hsr-badge hc-badge ${s.action}">${s.action} ${s.score}</span>
      </div>`).join('');
    }
    box.classList.add('open');
  },
  onSearchFocus(){
    const val=document.getElementById('homeSearchInput').value;
    if(val.trim())this.onSearch(val);
  },
  closeSearch(){
    document.getElementById('homeSearchResults').classList.remove('open');
  },

  /* ── Home Section Toggle ── */
  homeSection(key){
    const map={top:'hsTop',market:'hsMarket'};
    const el=document.getElementById(map[key]);
    if(!el)return;
    const isOpen=el.classList.contains('open');
    el.classList.toggle('open');
    if(!isOpen){
      setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),50);
    }
  },

  /* renderStocks removed — replaced by renderCalendar */

  renderAlerts(){
    const unread=this.ALERTS.filter(a=>!a.read).length;
    const badge=document.getElementById('alertBadge');
    if(unread>0){badge.textContent=unread;badge.style.display='flex';}
    else{badge.style.display='none';}

    document.getElementById('alertList').innerHTML=this.ALERTS.map(a=>`
      <div class="alert-item fu">
        <div class="al-dot p${a.priority}${a.read?' read':''}"></div>
        <div class="al-body">
          <div class="al-time">${a.time} · ${a.type}</div>
          <div class="al-title">${a.title}</div>
          <div class="al-desc">${a.desc}</div>
        </div>
      </div>
    `).join('');
  },

  /* ── Init ── */
  closeApp(){
    // window.close는 스크립트가 연 탭에서만 동작
    // Android Chrome에서는 about:blank로 이동하면 탭이 빈 페이지로 전환됨
    try{ window.close(); }catch(e){}
    setTimeout(()=>{ location.replace('about:blank'); },200);
  },
  init(){
    this.applyTheme();
    this.renderHome();
    this.renderCalendar();
    this.renderAlerts();
    // 원격 데이터 비동기 로드 (성공하면 자동 갱신)
    this.loadRemoteData();
    // ── 뒤로가기 → 항상 홈 ──
    history.replaceState({sx:'home'},'');
    window.addEventListener('popstate',(e)=>{
      if(this.detailOpen){
        this.closeDetail(true);
        return;
      }
      // 모든 탭에서 뒤로가기 → 홈으로
      this.go('pgHome',document.querySelector('.bb-item[data-pg="pgHome"]'));
      // 홈 state 다시 push해서 브라우저 종료 방지
      history.pushState({sx:'home'},'');
    });
  }
};

// 외부에서 실제 JSON으로 상세 렌더링 가능
window.SX_renderFull=function(data){
  SX.openDetail(data.identity.symbol);
  setTimeout(()=>SX.renderFullDetail(data),50);
};

SX.init();
</script>
</body>
</html>
