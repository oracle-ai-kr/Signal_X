<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SIGNAL X</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ═══ Theme System ═══ */
:root{
  --bg:#0b0d11;
  --surface:#141720;
  --surface2:#1a1e28;
  --surface3:#222733;
  --accent:var(--t-accent,#3b82f6);
  --accent2:var(--t-accent2,#60a5fa);
  --accent-glow:var(--t-glow,rgba(59,130,246,.12));
  --text:#eef0f4;
  --text2:#8b92a0;
  --text3:#505868;
  --border:rgba(255,255,255,.06);
  --buy:#22c55e;--buy-bg:rgba(34,197,94,.1);--buy-border:rgba(34,197,94,.25);
  --hold:#f59e0b;--hold-bg:rgba(245,158,11,.1);--hold-border:rgba(245,158,11,.25);
  --sell:#ef4444;--sell-bg:rgba(239,68,68,.1);--sell-border:rgba(239,68,68,.25);
  --risk-low:#22c55e;--risk-mid:#f59e0b;--risk-high:#ef4444;
  --radius:14px;--radius-sm:10px;
  --bottom-h:60px;
}
body.sx-light{
  --bg:#f3f4f6;--surface:#ffffff;--surface2:#f0f1f4;--surface3:#e6e8ec;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --border:rgba(0,0,0,.06);
  --accent-glow:var(--t-glow-l,rgba(59,130,246,.06));
  --buy-bg:rgba(34,197,94,.06);--buy-border:rgba(34,197,94,.18);
  --hold-bg:rgba(245,158,11,.06);--hold-border:rgba(245,158,11,.18);
  --sell-bg:rgba(239,68,68,.06);--sell-border:rgba(239,68,68,.18);
}
[data-t="blue"]{--t-accent:#3b82f6;--t-accent2:#60a5fa;--t-glow:rgba(59,130,246,.12);--t-glow-l:rgba(59,130,246,.06);}
[data-t="cyan"]{--t-accent:#06b6d4;--t-accent2:#22d3ee;--t-glow:rgba(6,182,212,.12);--t-glow-l:rgba(6,182,212,.06);}
[data-t="violet"]{--t-accent:#8b5cf6;--t-accent2:#a78bfa;--t-glow:rgba(139,92,246,.12);--t-glow-l:rgba(139,92,246,.06);}
[data-t="rose"]{--t-accent:#f43f5e;--t-accent2:#fb7185;--t-glow:rgba(244,63,94,.12);--t-glow-l:rgba(244,63,94,.06);}
[data-t="emerald"]{--t-accent:#10b981;--t-accent2:#34d399;--t-glow:rgba(16,185,129,.12);--t-glow-l:rgba(16,185,129,.06);}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR','Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;}

/* ═══ App Shell ═══ */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;}

/* Top Bar */
.top-bar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.tb-logo{display:flex;align-items:center;gap:8px;}
.tb-logo-mark{
  width:28px;height:28px;border-radius:8px;
  background:var(--accent);color:#fff;
  font-family:'Outfit';font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
}
.tb-logo-text{font-family:'Outfit';font-size:16px;font-weight:800;letter-spacing:.5px;}
.tb-logo-text span{color:var(--accent);}

/* Pages */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
.pad{padding:16px 16px 32px;}

/* Bottom Bar */
.bottom-bar{
  display:flex;align-items:center;justify-content:space-around;
  height:var(--bottom-h);
  background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;
}
.bb-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:6px 16px;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.bb-item svg{width:22px;height:22px;color:var(--text3);transition:color .15s;}
.bb-label{font-size:10px;color:var(--text3);font-weight:500;transition:color .15s;}
.bb-item.active svg{color:var(--accent);}
.bb-item.active .bb-label{color:var(--accent);font-weight:700;}
.bb-item:active{transform:scale(.92);}
.bb-icon-wrap{position:relative;}
.bb-badge{
  position:absolute;top:-3px;right:-8px;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  background:var(--sell);color:#fff;
  font-size:9px;font-weight:800;font-family:'Outfit';
  display:flex;align-items:center;justify-content:center;
}

/* ═══ Common ═══ */
.pg-title{font-size:18px;font-weight:800;margin:16px 0 4px;letter-spacing:-.3px;}
.pg-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .35s ease both;}
.fu:nth-child(2){animation-delay:.06s;}
.fu:nth-child(3){animation-delay:.12s;}
.fu:nth-child(4){animation-delay:.18s;}
.fu:nth-child(5){animation-delay:.24s;}

/* ═══ HOME ═══ */
.market-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;
}
.mk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mk-label{font-size:12px;font-weight:700;color:var(--accent);}
.mk-date{font-size:11px;color:var(--text3);}
.mk-text{font-size:13px;color:var(--text2);line-height:1.7;}
.mk-text b{color:var(--text);font-weight:600;}

.home-section-title{font-size:14px;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
.home-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;
  cursor:pointer;transition:border-color .2s;
}
.home-card:active{border-color:var(--accent);}
.hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.hc-name{font-size:14px;font-weight:700;}
.hc-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;}
.hc-badge.BUY{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border);}
.hc-badge.HOLD{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-border);}
.hc-badge.SELL{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border);}
.hc-row{display:flex;gap:12px;margin-bottom:4px;}
.hc-score{font-family:'Outfit';font-size:13px;font-weight:600;color:var(--text2);}
.hc-score b{color:var(--text);font-weight:800;}
.hc-comment{font-size:12px;color:var(--text3);line-height:1.5;}

/* ═══ CALENDAR (이력) ═══ */
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding:0 4px;
}
.cal-nav-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--text);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.cal-nav-btn:active{transform:scale(.9);background:var(--accent-glow);}
.cal-month{font-family:'Outfit';font-size:15px;font-weight:700;letter-spacing:-.3px;}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  margin-bottom:16px;
}
.cal-dow{
  text-align:center;font-size:10px;font-weight:700;
  color:var(--text3);padding:6px 0;
}
.cal-dow:first-child{color:var(--sell);}
.cal-dow:last-child{color:var(--accent);}
.cal-cell{
  position:relative;text-align:center;padding:8px 0;
  font-family:'Outfit';font-size:13px;font-weight:500;
  color:var(--text2);border-radius:10px;cursor:pointer;
  transition:all .15s;min-height:36px;
  display:flex;align-items:center;justify-content:center;
}
.cal-cell:empty{cursor:default;}
.cal-cell.today{color:var(--accent);font-weight:800;}
.cal-cell.selected{background:var(--accent);color:#fff;font-weight:800;}
.cal-cell.has-data::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:5px;height:5px;border-radius:50%;background:var(--accent);
}
.cal-cell.selected.has-data::after{background:#fff;}
.cal-cell.other-month{color:var(--text3);opacity:.35;}
.cal-cell:not(:empty):active{background:var(--accent-glow);}
.cal-cell.sun{color:var(--sell);}
.cal-cell.sat{color:var(--accent);}
.cal-cell.selected.sun,.cal-cell.selected.sat{color:#fff;}

.cal-day-label{
  font-size:13px;font-weight:700;color:var(--text2);
  margin-bottom:10px;padding:0 2px;
}
.cal-empty{
  text-align:center;padding:24px 0;
  font-size:12px;color:var(--text3);
}
.cal-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:border-color .2s;
}
.cal-item:active{border-color:var(--accent);}
.cal-item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.cal-item-icon{font-size:20px;flex-shrink:0;}
.cal-item-info{flex:1;min-width:0;}
.cal-item-name{font-size:13px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-item-comment{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cal-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px;}
.cal-item-score{font-family:'Outfit';font-size:14px;font-weight:800;color:var(--text);}
.cal-item-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;}
.cal-item-badge.BUY{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border);}
.cal-item-badge.HOLD{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-border);}
.cal-item-badge.SELL{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border);}
.cal-loading{text-align:center;padding:20px 0;font-size:12px;color:var(--text3);}

/* ═══ ALERTS ═══ */
.alert-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:14px;margin-bottom:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.al-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.al-dot.p1{background:var(--sell);box-shadow:0 0 6px rgba(239,68,68,.3);}
.al-dot.p2{background:var(--hold);box-shadow:0 0 6px rgba(245,158,11,.3);}
.al-dot.p3{background:var(--text3);}
.al-dot.read{opacity:.3;box-shadow:none;}
.al-body{flex:1;}
.al-time{font-size:10px;color:var(--text3);}
.al-title{font-size:13px;font-weight:700;margin:2px 0;}
.al-desc{font-size:12px;color:var(--text2);line-height:1.5;}

/* ═══ SETTINGS ═══ */
.set-group{margin-bottom:20px;}
.set-group-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;}
.theme-row{display:flex;gap:10px;margin-bottom:8px;}
.theme-dot{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .2s;
}
.theme-dot.active{border-color:var(--text);transform:scale(1.15);}
.theme-dot[data-t="blue"]{background:#3b82f6;}
.theme-dot[data-t="cyan"]{background:#06b6d4;}
.theme-dot[data-t="violet"]{background:#8b5cf6;}
.theme-dot[data-t="rose"]{background:#f43f5e;}
.theme-dot[data-t="emerald"]{background:#10b981;}
.set-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;
}
.set-item-left{display:flex;align-items:center;gap:10px;}
.set-item-icon{font-size:18px;}
.set-item-label{font-size:13px;font-weight:600;}
.toggle-sw{
  width:44px;height:24px;border-radius:12px;
  background:var(--surface3);position:relative;transition:background .2s;
}
.toggle-sw.on{background:var(--accent);}
.toggle-sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:20px;height:20px;border-radius:50%;
  background:#fff;transition:transform .2s;
}
.toggle-sw.on::after{transform:translateX(20px);}

/* ═══ DETAIL VIEW (7 Sections) ═══ */
#detailView{display:none;flex-direction:column;flex:1;overflow:hidden;}
#detailView.open{display:flex;}
.detail-bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:var(--bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.detail-back{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:none;color:var(--text);
  font-size:16px;cursor:pointer;
}
.detail-back:active{transform:scale(.9);}
.detail-title{flex:1;font-weight:700;font-size:15px;letter-spacing:-.3px;}
.detail-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 32px;scrollbar-width:none;}
.detail-scroll::-webkit-scrollbar{display:none;}

/* Section Cards */
.sec{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;
  animation:fadeUp .35s ease both;
}
.sec:nth-child(2){animation-delay:.06s;}
.sec:nth-child(3){animation-delay:.12s;}
.sec:nth-child(4){animation-delay:.18s;}
.sec:nth-child(5){animation-delay:.24s;}
.sec:nth-child(6){animation-delay:.3s;}
.sec:nth-child(7){animation-delay:.36s;}
.sec-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:5px;
  background:var(--accent);color:#fff;
  font-family:'Outfit';font-size:10px;font-weight:800;
  margin-right:7px;flex-shrink:0;
}
.sec-hdr{display:flex;align-items:center;font-size:14px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px;}

/* S1: Top Card */
.tc{border:none;position:relative;overflow:hidden;}
.tc.BUY{background:var(--buy-bg);border:1px solid var(--buy-border);}
.tc.HOLD{background:var(--hold-bg);border:1px solid var(--hold-border);}
.tc.SELL{background:var(--sell-bg);border:1px solid var(--sell-border);}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.tc-action{font-family:'Outfit';font-size:30px;font-weight:900;letter-spacing:1px;line-height:1;}
.tc-action.BUY{color:var(--buy);}.tc-action.HOLD{color:var(--hold);}.tc-action.SELL{color:var(--sell);}
.tc-label{font-size:11px;color:var(--text2);margin-top:3px;}
.tc-right{text-align:right;}
.tc-score{font-family:'Outfit';font-size:34px;font-weight:900;line-height:1;}
.tc-grade{font-family:'Outfit';font-size:12px;font-weight:600;color:var(--text2);margin-top:2px;}
.tc-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tc-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:16px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.tc-chip.tag{background:var(--accent-glow);color:var(--accent);border-color:var(--accent);}
.tc-headline{font-size:13px;line-height:1.7;letter-spacing:-.2px;}
.tc-explained{font-size:11.5px;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6;}

/* S2: Scoreboard */
.sb-grid{display:flex;flex-direction:column;gap:10px;}
.sb-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;}
.sb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sb-name{font-size:12px;font-weight:700;}
.sb-val{font-family:'Outfit';font-size:18px;font-weight:800;}
.sb-bar{width:100%;height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-bottom:5px;}
.sb-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.sb-row{display:flex;justify-content:space-between;align-items:center;}
.sb-rating{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;}
.sb-rating.strong{background:rgba(34,197,94,.1);color:#22c55e;}
.sb-rating.positive{background:rgba(59,130,246,.1);color:#60a5fa;}
.sb-rating.neutral{background:rgba(148,163,184,.1);color:#94a3b8;}
.sb-rating.weak{background:rgba(245,158,11,.1);color:#f59e0b;}
.sb-rating.danger{background:rgba(239,68,68,.1);color:#ef4444;}
.sb-rating.high{background:rgba(239,68,68,.1);color:#ef4444;}
.sb-rating.medium{background:rgba(245,158,11,.1);color:#f59e0b;}
.sb-rating.low{background:rgba(34,197,94,.1);color:#22c55e;}
.sb-weight{font-size:10px;color:var(--text3);}
.sb-comment{font-size:11.5px;color:var(--text2);line-height:1.6;margin-top:6px;}

/* S3: Action Plan */
.ap-prices{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.ap-p{flex:1;min-width:calc(50% - 4px);background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.ap-p-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.ap-p-val{font-family:'Outfit';font-size:15px;font-weight:700;}
.ap-p-val.g{color:var(--buy);}.ap-p-val.r{color:var(--sell);}.ap-p-val.a{color:var(--accent);}
.ap-scenarios{display:flex;flex-direction:column;gap:8px;}
.ap-sc{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;border-left:3px solid transparent;}
.ap-sc.bullish{border-left-color:var(--buy);}.ap-sc.neutral{border-left-color:var(--hold);}.ap-sc.bearish{border-left-color:var(--sell);}
.ap-sc-label{font-size:11px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.ap-sc.bullish .ap-sc-label{color:var(--buy);}.ap-sc.neutral .ap-sc-label{color:var(--hold);}.ap-sc.bearish .ap-sc-label{color:var(--sell);}
.ap-sc-text{font-size:12px;color:var(--text2);line-height:1.65;}

/* S4: Reasoning */
.rg{margin-bottom:12px;}.rg:last-child{margin-bottom:0;}
.rg-label{font-size:11px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.rg-label.pos{color:var(--buy);}.rg-label.neg{color:var(--sell);}.rg-label.chk{color:var(--accent);}
.rg-item{font-size:12px;color:var(--text2);line-height:1.65;padding:5px 0 5px 12px;border-left:2px solid var(--border);margin-bottom:3px;}

/* S5: Market Context */
.mc-grid{display:flex;gap:7px;margin-bottom:10px;}
.mc-item{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.mc-item-label{font-size:10px;color:var(--text3);margin-bottom:3px;}
.mc-item-val{font-size:13px;font-weight:700;}
.mc-relation{font-size:12px;color:var(--text2);line-height:1.65;padding:10px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px;}
.mc-memo{font-size:11px;color:var(--text3);line-height:1.6;}

/* S6: Alert */
.sec-alert-card{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;}
.sa-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.sa-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sa-dot.p1{background:var(--sell);box-shadow:0 0 6px rgba(239,68,68,.3);}
.sa-dot.p2{background:var(--hold);box-shadow:0 0 6px rgba(245,158,11,.3);}
.sa-dot.p3{background:var(--text3);}
.sa-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;}
.sa-title{font-size:13px;font-weight:700;margin-bottom:4px;}

<body>

<div id="app">
  <!-- ═══ Top Bar ═══ -->

  <!-- ═══ Pages ═══ -->
  <!-- HOME -->
  <div class="page active" id="pgHome">

  <!-- SETTINGS -->
  <div class="page" id="pgSettings">
    <div class="scroll-area"><div class="pad">
      <div class="pg-title">설정</div>

  <!-- ═══ Detail View (7 Sections) ═══ -->

  <!-- ═══ Bottom Bar ═══ -->

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>

      <span class="bb-label">설정</span>

<script>
/* ═══ SIGNAL X App ═══ */
const SX={
  theme:localStorage.getItem('SX_THEME')||'blue',
  light:localStorage.getItem('SX_MODE')!=='dark',
  detailOpen:false,

  /* ── Data API ── */
  API_BASE:'https://oracle-ai-kr.github.io/signal-x-data',
  MARKET:null,    // market/latest.json
  RANKING:null,   // ranking/latest.json
  ALERTS_DATA:null, // alerts/latest.json
  STOCK_CACHE:{}, // symbol → full JSON 캐시
  DAILY_INDEX:[], // daily/index.json에서 가져온 날짜 배열
  DAILY_CACHE:{}, // date → daily JSON 캐시
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(), // 0-based
  calSelected:null, // 'YYYY-MM-DD' or null

  /* ── Fallback Demo Data ── */
  STOCKS:[
    {symbol:'005930',name:'삼성전자',sector:'반도체',icon:'💎',action:'HOLD',score:52,grade:'C',risk:62,comment:'코스피 약세 속 반도체 섹터 관망. 외인 매도 지속.',headline:'외인 매도 지속 속 HBM 수혜 기대.',confidence:.68,status_tag:'관망'},
    {symbol:'064350',name:'현대로템',sector:'방산·기계',icon:'🛡️',action:'BUY',score:70,grade:'B',risk:55,comment:'방산 수출 확대 + 시장 역행 강세.',headline:'MACD 골든크로스 + ADX 강세 전환.',confidence:.72,status_tag:'반등 감지'},
    {symbol:'023590',name:'다우기술',sector:'IT 서비스',icon:'📊',action:'HOLD',score:45,grade:'D',risk:65,comment:'실적 부진 지속. 구조적 성장 의문.',headline:'기술적 반등 미약. 관망 유지.',confidence:.55,status_tag:''},
    {symbol:'253590',name:'네오셈',sector:'반도체 소재',icon:'⚠️',action:'SELL',score:28,grade:'F',risk:82,comment:'고점 대비 급락. 구조적 리스크 확대.',headline:'리스크 경고. 손실 제한 전략 필요.',confidence:.62,status_tag:'위험'},
    {symbol:'000660',name:'SK하이닉스',sector:'반도체',icon:'🧊',action:'BUY',score:75,grade:'B',risk:48,comment:'HBM 수주 확대. AI 반도체 수혜 지속.',headline:'HBM3E 양산 가속. 실적 상향 전망.',confidence:.78,status_tag:'강세 지속'},
    {symbol:'373220',name:'LG에너지솔루션',sector:'2차전지',icon:'🔋',action:'HOLD',score:55,grade:'C',risk:58,comment:'수요 둔화 우려와 북미 확장 사이 균형.',headline:'단기 약세, 중장기 성장성 유효.',confidence:.65,status_tag:''},
  ],

  ALERTS:[
    {time:'방금',title:'현대로템 +6.7% 급등',desc:'매수 신호 감지. 종합 70점.',priority:2,type:'new_signal',read:false},
    {time:'1시간 전',title:'네오셈 리스크 경고',desc:'종합 28점. 구조적 리스크 확대.',priority:1,type:'risk_alert',read:false},
    {time:'오늘',title:'삼성전자 점수 변동',desc:'종합 -5p 하락. 외인 매도 지속.',priority:2,type:'score_jump',read:true},
    {time:'어제',title:'SK하이닉스 매수 유지',desc:'HBM 수주 뉴스 반영. +8p.',priority:3,type:'new_signal',read:true},
  ],

  /* ── Fetch Helpers ── */
  async fetchJSON(path){
    try{
      const r=await fetch(`${this.API_BASE}/${path}`,{cache:'no-cache'});
      if(!r.ok)return null;
      return await r.json();
    }catch(e){console.warn('SX fetch fail:',path,e);return null;}
  },

  async loadRemoteData(){
    // 병렬로 market + ranking + alerts + daily index 가져오기
    const[market,ranking,alerts,dailyIdx]=await Promise.all([
      this.fetchJSON('market/latest.json'),
      this.fetchJSON('ranking/latest.json'),
      this.fetchJSON('alerts/latest.json'),
      this.fetchJSON('daily/index.json')
    ]);

    // Market
    if(market){
      this.MARKET=market;
      this.renderMarketCard(market);
    }

    // Ranking → STOCKS 대체
    if(ranking&&ranking.top_picks&&ranking.top_picks.length>0){
      const all=[...ranking.top_picks,...(ranking.spike_signals||[]),...(ranking.risk_warnings||[])];
      const seen=new Set();
      const unique=all.filter(s=>{if(seen.has(s.symbol))return false;seen.add(s.symbol);return true;});
      if(unique.length>0){
        this.STOCKS=unique;
        this.renderHome();
      }
    }

    // Alerts
    if(alerts&&alerts.events&&alerts.events.length>0){
      this.ALERTS=alerts.events.map(e=>({
        time:this.timeAgo(e.timestamp||e.time||''),
        title:e.title||'',
        desc:e.body||e.desc||'',
        priority:e.priority||3,
        type:e.alert_type||e.type||'',
        read:e.read||false
      }));
      this.renderAlerts();
    }

    // Daily Index → 달력 dot 갱신
    if(dailyIdx&&dailyIdx.dates){
      this.DAILY_INDEX=dailyIdx.dates;
      this.renderCalendar();
    }
  },

  renderMarketCard(m){
    const card=document.querySelector('.market-card .mk-text');
    if(!card)return;
    let html=m.headline||'';
    if(m.indices){
      const idx=m.indices;
      const parts=[];
      if(idx.kospi&&idx.kospi.value)parts.push(`코스피 <b>${idx.kospi.value.toLocaleString()}</b> (${idx.kospi.change>0?'+':''}${idx.kospi.change}%)`);
      if(idx.kosdaq&&idx.kosdaq.value)parts.push(`코스닥 <b>${idx.kosdaq.value.toLocaleString()}</b> (${idx.kosdaq.change>0?'+':''}${idx.kosdaq.change}%)`);
      if(parts.length)html+=`<br>${parts.join(' · ')}`;
    }
    if(m.environment&&m.environment.memo)html+=`<br>${m.environment.memo}`;
    card.innerHTML=html||'데이터가 연결되면 이 자리에 <b>시장 요약</b>이 표시됩니다.';
  },

  timeAgo(ts){
    if(!ts)return'—';
    try{
      const diff=Date.now()-new Date(ts).getTime();
      const min=Math.floor(diff/60000);
      if(min<1)return'방금';
      if(min<60)return`${min}분 전`;
      const hr=Math.floor(min/60);
      if(hr<24)return`${hr}시간 전`;
      const day=Math.floor(hr/24);
      if(day<7)return`${day}일 전`;
      return new Date(ts).toLocaleDateString('ko-KR');
    }catch(e){return ts;}
  },

  /* ── Fetch Stock Detail JSON ── */
  async fetchStockDetail(symbol){
    // 캐시 체크
    if(this.STOCK_CACHE[symbol])return this.STOCK_CACHE[symbol];
    // 주식 먼저, 없으면 코인
    let data=await this.fetchJSON(`stocks/${symbol}.json`);
    if(!data)data=await this.fetchJSON(`coins/${symbol}.json`);
    if(data){this.STOCK_CACHE[symbol]=data;}
    return data;
  },

  /* ── Navigation ── */
  go(pgId,el){
    if(this.detailOpen) this.closeDetail();
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(pgId).classList.add('active');
    document.querySelectorAll('.bb-item').forEach(b=>b.classList.remove('active'));
    if(el)el.classList.add('active');
    document.getElementById('mainTopBar').style.display='';
  },

  /* ── Detail ── */
  async openDetail(sym){
    const stock=this.STOCKS.find(s=>s.symbol===sym);
    if(!stock)return;
    const dv=document.getElementById('detailView');
    document.getElementById('mainTopBar').style.display='none';
    document.getElementById('bottomBar').style.display='none';
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    dv.classList.add('open');
    this.detailOpen=true;

    // 실제 JSON fetch 시도
    const fullData=await this.fetchStockDetail(sym);
    if(fullData&&fullData.identity){
      this.renderFullDetail(fullData);
    }else{
      this.renderDetail(stock);
    }
  },
  closeDetail(){
    const dv=document.getElementById('detailView');
    dv.classList.remove('open');
    document.getElementById('mainTopBar').style.display='';
    document.getElementById('bottomBar').style.display='';
    document.querySelectorAll('.page').forEach(p=>p.style.display='');
    this.detailOpen=false;
  },

  /* ── Render Detail (7 Sections) ── */
  renderDetail(s){
    // title bar
    document.getElementById('dtTitle').textContent=`${s.name} (${s.symbol})`;
    const badge=document.getElementById('dtBadge');
    badge.textContent=s.action;
    badge.style.background=s.action==='BUY'?'var(--buy-bg)':s.action==='SELL'?'var(--sell-bg)':'var(--hold-bg)';
    badge.style.color=s.action==='BUY'?'var(--buy)':s.action==='SELL'?'var(--sell)':'var(--hold)';
    badge.style.border=`1px solid ${s.action==='BUY'?'var(--buy-border)':s.action==='SELL'?'var(--sell-border)':'var(--hold-border)'}`;

    const area=document.getElementById('dtScroll');
    area.scrollTop=0;

    // 실제 JSON fetch 시에는 여기서 8구역 전체 렌더링
    // 데모: 더미 기반 7섹션
    const conf=Math.round((s.confidence||.7)*100);
    const rl=this.riskLabel(s.risk);

    area.innerHTML=`
      <!-- S1: 결론 -->
      <div class="sec tc ${s.action}">
        <div class="tc-top">
          <div><div class="tc-action ${s.action}">${s.action}</div><div class="tc-label">${this.actionLabel(s.action,s.score)}</div></div>
          <div class="tc-right"><div class="tc-score">${s.score}</div><div class="tc-grade">Grade ${s.grade} · ${conf}%</div></div>
        </div>
        <div class="tc-chips">
          <span class="tc-chip">${s.sector}</span>
          <span class="tc-chip">일봉</span>
          ${s.status_tag?`<span class="tc-chip tag">${s.status_tag}</span>`:''}
        </div>
        <div class="tc-headline">${s.headline}</div>
      </div>

      <!-- S2: 점수 구조 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">2</span>점수 구조</div>
        <div class="sb-grid">
          ${this.demoScore('가치',65,'neutral',30)}
          ${this.demoScore('성장',72,'positive',25)}
          ${this.demoScore('모멘텀',s.score>60?78:42,s.score>60?'strong':'weak',25)}
          ${this.demoScoreRisk('리스크',s.risk,s.risk>60?'high':s.risk>30?'medium':'low',20)}
        </div>
      </div>

      <!-- S3: 행동 가이드 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">3</span>행동 가이드</div>
        <div class="ap-prices">
          <div class="ap-p"><div class="ap-p-label">현재가</div><div class="ap-p-val">—</div></div>
          <div class="ap-p"><div class="ap-p-label">진입 구간</div><div class="ap-p-val a">—</div></div>
          <div class="ap-p"><div class="ap-p-label">목표 1</div><div class="ap-p-val g">—</div></div>
          <div class="ap-p"><div class="ap-p-label">손절</div><div class="ap-p-val r">—</div></div>
        </div>
        <div class="ap-scenarios">
          <div class="ap-sc bullish"><div class="ap-sc-label">🟢 상승</div><div class="ap-sc-text">실제 JSON 연결 시 시나리오가 표시됩니다.</div></div>
          <div class="ap-sc neutral"><div class="ap-sc-label">🟡 횡보</div><div class="ap-sc-text">실제 JSON 연결 시 시나리오가 표시됩니다.</div></div>
          <div class="ap-sc bearish"><div class="ap-sc-label">🔴 하락</div><div class="ap-sc-text">실제 JSON 연결 시 시나리오가 표시됩니다.</div></div>
        </div>
      </div>

      <!-- S4: 근거 요약 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">4</span>근거 요약</div>
        <div class="rg"><div class="rg-label pos">▲ 긍정</div><div class="rg-item">실제 JSON 연결 시 긍정 근거가 표시됩니다.</div></div>
        <div class="rg"><div class="rg-label neg">▼ 부정</div><div class="rg-item">실제 JSON 연결 시 부정 근거가 표시됩니다.</div></div>
        <div class="rg"><div class="rg-label chk">◆ 체크포인트</div><div class="rg-item">실제 JSON 연결 시 체크포인트가 표시됩니다.</div></div>
      </div>

      <!-- S5: 시장 맥락 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">5</span>시장 맥락</div>
        <div class="mc-grid">
          <div class="mc-item"><div class="mc-item-label">시장 국면</div><div class="mc-item-val">—</div></div>
          <div class="mc-item"><div class="mc-item-label">리스크</div><div class="mc-item-val" style="color:${rl.color}">${s.risk} ${rl.text}</div></div>
          <div class="mc-item"><div class="mc-item-label">방향</div><div class="mc-item-val">—</div></div>
        </div>
        <div class="mc-relation">실제 JSON 연결 시 시장 관계 분석이 표시됩니다.</div>
      </div>

      <!-- S6: 알림 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">6</span>알림</div>
        <div class="sa-none">실제 JSON 연결 시 알림 정보가 표시됩니다.</div>
      </div>

      <!-- S7: 리포트 -->
      <div class="sec">
        <div class="sec-hdr"><span class="sec-num">7</span>리포트</div>
        <div class="rpt-block"><div class="rpt-label">해석</div><div class="rpt-text">실제 JSON 연결 시 분석 해석이 표시됩니다.</div></div>
        <div class="rpt-block"><div class="rpt-label">변화 사유</div><div class="rpt-text">실제 JSON 연결 시 변화 사유가 표시됩니다.</div></div>
        <div class="rpt-block"><div class="rpt-label">시장 연관</div><div class="rpt-text">실제 JSON 연결 시 시장 연관 분석이 표시됩니다.</div></div>
      </div>

      <div class="meta-ft">SIGNAL X · v1.0 · 데모 데이터</div>
    `;
  },

  /* ── Render: Full JSON (실제 연동용) ── */
  renderFullDetail(data){
    const{identity:id,summary:sm,scoreboard:sb,action_plan:ap,reasoning:rs,market_context:mc,alerting:al,meta}=data;
    document.getElementById('dtTitle').textContent=`${id.name} (${id.symbol})`;
    const badge=document.getElementById('dtBadge');
    badge.textContent=sm.action;
    badge.style.background=sm.action==='BUY'?'var(--buy-bg)':sm.action==='SELL'?'var(--sell-bg)':'var(--hold-bg)';
    badge.style.color=sm.action==='BUY'?'var(--buy)':sm.action==='SELL'?'var(--sell)':'var(--hold)';
    badge.style.border=`1px solid ${sm.action==='BUY'?'var(--buy-border)':sm.action==='SELL'?'var(--sell-border)':'var(--hold-border)'}`;

    const area=document.getElementById('dtScroll');
    area.scrollTop=0;
    const conf=Math.round(sm.confidence*100);
    const dims=[{k:'value',l:'가치'},{k:'growth',l:'성장'},{k:'momentum',l:'모멘텀'},{k:'risk',l:'리스크'}];
    const rl=this.riskLabel(mc.risk_level);
    const fmt=n=>n==null?'—':typeof n==='number'?n.toLocaleString('ko-KR'):String(n);
    const bc=(sc,isR)=>{if(isR){return sc<=30?'var(--risk-low)':sc<=60?'var(--risk-mid)':'var(--risk-high)';}return sc>=70?'var(--buy)':sc>=50?'var(--accent)':sc>=30?'var(--hold)':'var(--sell)';};

    let html=`
      <div class="sec tc ${sm.action}">
        <div class="tc-top">
          <div><div class="tc-action ${sm.action}">${sm.action}</div><div class="tc-label">${sm.label}</div></div>
          <div class="tc-right"><div class="tc-score">${sm.score}</div><div class="tc-grade">Grade ${sm.grade} · ${conf}%</div></div>
        </div>
        <div class="tc-chips">
          <span class="tc-chip">${id.market}</span><span class="tc-chip">${id.sector}</span><span class="tc-chip">${id.timeframe}</span>
          ${sm.status_tag?`<span class="tc-chip tag">${sm.status_tag}</span>`:''}
        </div>
        <div class="tc-headline">${sm.headline}</div>
        ${sm.score_explained?`<div class="tc-explained">${sm.score_explained}</div>`:''}
      </div>

      <div class="sec"><div class="sec-hdr"><span class="sec-num">2</span>점수 구조</div><div class="sb-grid">`;
    dims.forEach(d=>{
      const it=sb[d.k];if(!it)return;
      const isR=d.k==='risk';const c=bc(it.score,isR);
      html+=`<div class="sb-item"><div class="sb-top"><span class="sb-name">${d.l}</span><span class="sb-val" style="color:${c}">${it.score}</span></div>
        <div class="sb-bar"><div class="sb-bar-fill" style="width:${it.score}%;background:${c}"></div></div>
        <div class="sb-row"><span class="sb-rating ${it.rating}">${it.rating}</span><span class="sb-weight">${Math.round(it.weight*100)}%</span></div>
        <div class="sb-comment">${it.comment}</div></div>`;
    });
    html+=`</div></div>`;

    const ez=ap.entry_zone?`${fmt(ap.entry_zone[0])} ~ ${fmt(ap.entry_zone[1])}`:'—';
    html+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">3</span>행동 가이드</div>
      <div class="ap-prices">
        <div class="ap-p"><div class="ap-p-label">현재가</div><div class="ap-p-val">${fmt(ap.current_price)}</div></div>
        <div class="ap-p"><div class="ap-p-label">진입 구간</div><div class="ap-p-val a">${ez}</div></div>
        <div class="ap-p"><div class="ap-p-label">목표 1</div><div class="ap-p-val g">${fmt(ap.target_1)}</div></div>
        <div class="ap-p"><div class="ap-p-label">목표 2</div><div class="ap-p-val g">${fmt(ap.target_2)}</div></div>
        <div class="ap-p"><div class="ap-p-label">손절</div><div class="ap-p-val r">${fmt(ap.stop_loss)}</div></div>
      </div>`;
    if(ap.scenarios){
      html+=`<div class="ap-scenarios">`;
      ['bullish','neutral','bearish'].forEach(k=>{if(ap.scenarios[k])html+=`<div class="ap-sc ${k}"><div class="ap-sc-label">${k==='bullish'?'🟢 상승':k==='neutral'?'🟡 횡보':'🔴 하락'}</div><div class="ap-sc-text">${ap.scenarios[k]}</div></div>`;});
      html+=`</div>`;
    }
    html+=`</div>`;

    html+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">4</span>근거 요약</div>`;
    if(rs.positive?.length){html+=`<div class="rg"><div class="rg-label pos">▲ 긍정 (${rs.positive.length})</div>`;rs.positive.forEach(t=>html+=`<div class="rg-item">${t}</div>`);html+=`</div>`;}
    if(rs.negative?.length){html+=`<div class="rg"><div class="rg-label neg">▼ 부정 (${rs.negative.length})</div>`;rs.negative.forEach(t=>html+=`<div class="rg-item">${t}</div>`);html+=`</div>`;}
    if(rs.checkpoints?.length){html+=`<div class="rg"><div class="rg-label chk">◆ 체크포인트 (${rs.checkpoints.length})</div>`;rs.checkpoints.forEach(t=>html+=`<div class="rg-item">${t}</div>`);html+=`</div>`;}
    html+=`</div>`;

    html+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">5</span>시장 맥락</div>
      <div class="mc-grid">
        <div class="mc-item"><div class="mc-item-label">시장 국면</div><div class="mc-item-val">${mc.phase}</div></div>
        <div class="mc-item"><div class="mc-item-label">리스크</div><div class="mc-item-val" style="color:${rl.color}">${mc.risk_level} ${rl.text}</div></div>
        <div class="mc-item"><div class="mc-item-label">방향</div><div class="mc-item-val">${mc.direction}</div></div>
      </div>
      <div class="mc-relation">${mc.relation}</div>
      ${mc.environment_memo?`<div class="mc-memo">${mc.environment_memo}</div>`:''}
    </div>`;

    html+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">6</span>알림</div>`;
    if(al?.should_notify){
      html+=`<div class="sec-alert-card"><div class="sa-top"><div class="sa-dot p${al.priority}"></div><div class="sa-type">${al.alert_type}</div></div><div class="sa-title">${al.title}</div><div class="sa-body">${al.body}</div></div>`;
    }else{html+=`<div class="sa-none">알림 없음</div>`;}
    html+=`</div>`;

    if(rs.report){
      html+=`<div class="sec"><div class="sec-hdr"><span class="sec-num">7</span>리포트</div>`;
      [{k:'interpretation',l:'해석'},{k:'change_reason',l:'변화 사유'},{k:'market_relation',l:'시장 연관'},{k:'watch_note',l:'관찰 포인트'}].forEach(b=>{
        if(rs.report[b.k])html+=`<div class="rpt-block"><div class="rpt-label">${b.l}</div><div class="rpt-text">${rs.report[b.k]}</div></div>`;
      });
      html+=`</div>`;
    }

    const ts=id.analyzed_at?new Date(id.analyzed_at).toLocaleString('ko-KR'):'—';
    html+=`<div class="meta-ft">SIGNAL X · ${meta?.scoring_model||'—'} · ${ts}</div>`;
    area.innerHTML=html;
  },

  /* ── Helpers ── */
  riskLabel(sc){
    if(sc<=30)return{text:'안정',color:'var(--risk-low)'};
    if(sc<=60)return{text:'주의',color:'var(--risk-mid)'};
    return{text:'위험',color:'var(--risk-high)'};
  },
  actionLabel(a,sc){
    if(sc>=85)return'강한 매수 후보';if(sc>=70)return'관심 관찰';
    if(sc>=50)return'보류';if(sc>=30)return'주의';return'회피';
  },
  demoScore(name,score,rating,weight){
    const c=score>=70?'var(--buy)':score>=50?'var(--accent)':score>=30?'var(--hold)':'var(--sell)';
    return`<div class="sb-item"><div class="sb-top"><span class="sb-name">${name}</span><span class="sb-val" style="color:${c}">${score}</span></div>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${score}%;background:${c}"></div></div>
      <div class="sb-row"><span class="sb-rating ${rating}">${rating}</span><span class="sb-weight">${weight}%</span></div></div>`;
  },
  demoScoreRisk(name,score,rating,weight){
    const c=score<=30?'var(--risk-low)':score<=60?'var(--risk-mid)':'var(--risk-high)';
    return`<div class="sb-item"><div class="sb-top"><span class="sb-name">${name}</span><span class="sb-val" style="color:${c}">${score}</span></div>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${score}%;background:${c}"></div></div>
      <div class="sb-row"><span class="sb-rating ${rating}">${rating}</span><span class="sb-weight">${weight}%</span></div></div>`;
  },

  /* ── Theme ── */
  applyTheme(){
    document.body.setAttribute('data-t',this.theme);
    document.body.classList.toggle('sx-light',this.light);
    localStorage.setItem('SX_THEME',this.theme);
    localStorage.setItem('SX_MODE',this.light?'light':'dark');
    this.renderThemeDots();
    const tog=document.getElementById('modeToggle');
    if(tog)tog.classList.toggle('on',!this.light);// on=다크
  },
  renderThemeDots(){
    const row=document.getElementById('themeRow');
    if(!row)return;
    row.innerHTML=['blue','cyan','violet','rose','emerald'].map(t=>
      `<div class="theme-dot${t===this.theme?' active':''}" data-t="${t}" onclick="SX.setTheme('${t}')"></div>`
    ).join('');
  },
  setTheme(t){this.theme=t;this.applyTheme();},
  toggleMode(){this.light=!this.light;this.applyTheme();},

  /* ── Calendar ── */
  calPrev(){
    this.calMonth--;
    if(this.calMonth<0){this.calMonth=11;this.calYear--;}
    this.calSelected=null;
    this.renderCalendar();
  },
  calNext(){
    this.calMonth++;
    if(this.calMonth>11){this.calMonth=0;this.calYear++;}
    this.calSelected=null;
    this.renderCalendar();
  },
  calDateStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;},
  renderCalendar(){
    const y=this.calYear,m=this.calMonth;
    document.getElementById('calMonth').textContent=`${y}년 ${m+1}월`;
    const grid=document.getElementById('calGrid');
    const first=new Date(y,m,1);
    const lastDay=new Date(y,m+1,0).getDate();
    const startDow=first.getDay(); // 0=Sun
    const today=new Date();
    const todayStr=this.calDateStr(today.getFullYear(),today.getMonth(),today.getDate());

    let html='';
    ['일','월','화','수','목','금','토'].forEach(d=>html+=`<div class="cal-dow">${d}</div>`);

    // 이전달 빈칸
    const prevLast=new Date(y,m,0).getDate();
    for(let i=startDow-1;i>=0;i--){
      html+=`<div class="cal-cell other-month">${prevLast-i}</div>`;
    }

    // 이번달
    for(let d=1;d<=lastDay;d++){
      const ds=this.calDateStr(y,m,d);
      const dow=new Date(y,m,d).getDay();
      let cls='cal-cell';
      if(ds===todayStr)cls+=' today';
      if(ds===this.calSelected)cls+=' selected';
      if(this.DAILY_INDEX.includes(ds))cls+=' has-data';
      if(dow===0)cls+=' sun';
      if(dow===6)cls+=' sat';
      html+=`<div class="${cls}" onclick="SX.selectDate('${ds}')">${d}</div>`;
    }

    // 다음달 빈칸
    const totalCells=startDow+lastDay;
    const remain=totalCells%7===0?0:7-totalCells%7;
    for(let i=1;i<=remain;i++){
      html+=`<div class="cal-cell other-month">${i}</div>`;
    }

    grid.innerHTML=html;

    // 선택된 날짜 없으면 리스트 초기화
    if(!this.calSelected){
      document.getElementById('calDayLabel').innerHTML='';
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">날짜를 선택하면 분석 이력이 표시됩니다.</div>';
    }
  },

  async selectDate(ds){
    this.calSelected=ds;
    this.renderCalendar();
    const parts=ds.split('-');
    const label=`${parseInt(parts[1])}월 ${parseInt(parts[2])}일 분석`;
    document.getElementById('calDayLabel').innerHTML=`<div class="cal-day-label">${label}</div>`;
    document.getElementById('calDayList').innerHTML='<div class="cal-loading">불러오는 중...</div>';

    let data=this.DAILY_CACHE[ds];
    if(!data){
      data=await this.fetchJSON(`daily/${ds}.json`);
      if(data)this.DAILY_CACHE[ds]=data;
    }

    if(data&&data.stocks&&data.stocks.length>0){
      document.getElementById('calDayList').innerHTML=data.stocks.map(s=>
        `<div class="cal-item fu" onclick="SX.openDetail('${s.symbol}')">
          <div class="cal-item-left">
            <div class="cal-item-icon">${s.icon||'📊'}</div>
            <div class="cal-item-info">
              <div class="cal-item-name">${s.name}</div>
              <div class="cal-item-comment">${s.comment||s.headline||''}</div>
            </div>
          </div>
          <div class="cal-item-right">
            <span class="cal-item-score">${s.score}</span>
            <span class="cal-item-badge ${s.action}">${s.action}</span>
          </div>
        </div>`
      ).join('');
    }else if(this.DAILY_INDEX.includes(ds)){
      // index에는 있지만 fetch 실패
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">데이터를 불러올 수 없습니다.</div>';
    }else{
      document.getElementById('calDayList').innerHTML='<div class="cal-empty">이 날짜에 분석된 종목이 없습니다.</div>';
    }
  },

  /* ── Render Lists ── */
  renderHome(){
    const d=new Date();
    document.getElementById('mkDate').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

    // Top picks (BUY)
    const top=this.STOCKS.filter(s=>s.action==='BUY').sort((a,b)=>b.score-a.score);
    document.getElementById('homeTopList').innerHTML=top.map(s=>this.homeCard(s)).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 0;">추천 종목이 없습니다.</div>';

    // Spike
    const spike=this.STOCKS.filter(s=>s.score>=65&&s.action!=='SELL');
    document.getElementById('homeSpikeList').innerHTML=spike.slice(0,3).map(s=>this.homeCard(s)).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 0;">이상 신호가 없습니다.</div>';

    // Risk
    const risky=this.STOCKS.filter(s=>s.risk>=60).sort((a,b)=>b.risk-a.risk);
    document.getElementById('homeRiskList').innerHTML=risky.slice(0,3).map(s=>this.homeCard(s)).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 0;">위험 종목이 없습니다.</div>';
  },
  homeCard(s){
    return`<div class="home-card fu" onclick="SX.openDetail('${s.symbol}')">
      <div class="hc-top"><span class="hc-name">${s.icon} ${s.name}</span><span class="hc-badge ${s.action}">${s.action} ${s.score}</span></div>
      <div class="hc-comment">${s.comment}</div>
    </div>`;
  },

  /* renderStocks removed — replaced by renderCalendar */

  renderAlerts(){
    const unread=this.ALERTS.filter(a=>!a.read).length;
    const badge=document.getElementById('alertBadge');
    if(unread>0){badge.textContent=unread;badge.style.display='flex';}
    else{badge.style.display='none';}

    document.getElementById('alertList').innerHTML=this.ALERTS.map(a=>`
      <div class="alert-item fu">
        <div class="al-dot p${a.priority}${a.read?' read':''}"></div>
        <div class="al-body">
          <div class="al-time">${a.time} · ${a.type}</div>
          <div class="al-title">${a.title}</div>
          <div class="al-desc">${a.desc}</div>
        </div>
      </div>
    `).join('');
  },

  /* ── Init ── */
  init(){
    this.applyTheme();
    this.renderHome();
    this.renderCalendar();
    this.renderAlerts();
    // 원격 데이터 비동기 로드 (성공하면 자동 갱신)
    this.loadRemoteData();
  }
};

// 외부에서 실제 JSON으로 상세 렌더링 가능
window.SX_renderFull=function(data){
  SX.openDetail(data.identity.symbol);
  setTimeout(()=>SX.renderFullDetail(data),50);
};

SX.init();
</script>
</body>
</html>
